body: |-
  # ADR-1044: Markdown and workspace import boundary
  
  ## Decision
  
  MdWrk shall govern markdown file imports, desktop host-opened files, and workspace folder mounts as distinct import boundaries. Imported markdown content, mounted filesystem projects, and transient open-file sessions shall be represented explicitly so persistence, tab behavior, and failure states remain predictable.
  
  ## Scope
  
  - Browser markdown file import.
  - Desktop open-markdown-file flows.
  - Desktop launch files and host open events.
  - Mounted project directory loading.
  - Imported-file persistence and duplicate handling.
  
  ## Consequences
  
  - Import behavior can be tested independently from export and persistence behavior.
  - Desktop filesystem projects can retain source paths while browser imports remain web-storage backed.
  - SPECs must define encoding, naming, duplicate, and permission failure rules.
