body: |-
  ## Decision
  
  # ADR-0017 â€” Phase 10 i18n, language UX, and catalog coverage checkpoint
  
  Date: 2026-03-28
  Status: accepted for the current checkpoint zip
  
  This checkpoint accepts the following decisions.
  
  ### Core shell locales are restored in the shared i18n package
  
  The active source line now restores the shipped core locale inventory to:
  
  - `en`
  - `es`
  - `fr`
  - `pt`
  - `ur`
  
  These core shell catalogs live in `@mdwrk/i18n`, not inside the client app.
  
  ### Language selection is now visible and persistent
  
  The active client now exposes:
  
  - a visible language selector in settings; and
  - a compact optional language selector in the project-selector surface.
  
  Locale choice is persisted through:
  
  - the client i18n service local storage key; and
  - the host settings store key `core.locale`.
  
  ### Catalog-driven shell coverage is broadened
  
  The audited Phase 10 shell/settings boundary now routes strings through i18n for:
  
  - action-rail navigation aria-label
  - header shell strings
  - footer/status bar strings
  - settings modal strings
  - data settings strings
  - Git settings strings
  - OIDC selector strings
  - repository autocomplete strings
  - markdown profile settings strings
  - core command / settings section titles within the registration layer
  
  ### Extension catalogs remain package-local
  
  Core shell catalogs remain in `@mdwrk/i18n` plus client registration.
  Extension-specific catalogs remain with their respective extension packages.
  
  This keeps the package boundary aligned with the certification policy and avoids folding extension catalogs into the core shell package.
  
  ## Context
  
  The v2 repository already had the stronger i18n architecture:
  
  - package-backed locale catalogs
  - fallback-aware locale resolution
  - namespaced loaders for extension packages
  - a runtime host API for locale selection
  
  However, the shipped core app still lagged behind v1 parity in three visible ways:
  
  - the core shell effectively only shipped minimal `en`
  - there was no visible language selector in the UI
  - a meaningful portion of header/status/settings/action-rail shell strings still relied on ad hoc or fallback-only text instead of explicit catalog-driven flow
  
  ## Evidence
  
  This checkpoint is backed by:
  
  - `npm run test -w @mdwrk/i18n`
  - `node apps/client/tests/phase10-i18n-parity.mjs --json`
  - `node tools/conformance/generate-phase10-i18n-checkpoint.mjs`
  
  The machine-readable outputs are:
  
  - `artifacts/conformance/latest/phase-10-i18n-results.json`
  - `artifacts/conformance/latest/phase-10-i18n-checkpoint.json`
  - `artifacts/conformance/latest/phase-10-i18n-parity-node-results.json`
