body: |-
  # Context
  Page-template systems need links such as learning paths to courses, courses to modules, modules to quizzes, home pages to legal/support pages, FAQ hubs to Q&A pages, and product pages to proof or package pages. URL strings alone do not preserve meaning, direction, cardinality, ordering, topology, terminality, or validation requirements.
  
  # Decision
  Represent page-template links as explicit semantic template-graph edges between independent page instances. A parent page does not include child pages as embedded content; it links to them through resolved relationship slots.
  
  Graph relationships must distinguish tree-child topology from navigation links and general semantic links. Tree-child relationships shape sitemap branches and child-slot validation. Navigation relationships include parent, previous, next, breadcrumbs, and related navigation. Semantic relationships include legal, support, references, FAQ question, course module, module quiz, and other domain-specific meanings.
  
  Templates may declare topology constraints. A required child policy demands child slots that satisfy minimum counts. An optional child policy allows empty child slots while validating any provided children. A terminal policy rejects tree-child edges while still allowing navigation and semantic links such as parent, previous, next, related, support, and legal.
  
  # Boundaries
  Templates declare allowed slots, relationship roles, topology constraints, and rendering intents. Downstream content packs or preset packages instantiate pages and edges. The resolver converts edges into outgoing slots, incoming context, breadcrumbs, ordered lists, related sections, next/previous navigation, footer links, and schema inputs.
  
  # Consequences
  Page-template packages remain portable while downstream products get strongly typed, validated page-to-page structures instead of ad hoc URL lists or ambiguous page containment.
