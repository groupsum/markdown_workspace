body: |-
  # ADR-1039: Shared OIDC adapter boundary
  
  ## Decision
  
  MdWrk shall place browser OIDC callback handling, popup forwarding, pending-session cleanup, state validation, and credential persistence behind a shared OIDC adapter boundary. Git and agent authentication features shall consume this boundary instead of duplicating token flow logic.
  
  ## Scope
  
  - Browser implicit-flow callback parsing.
  - Idle routes without OIDC parameters.
  - Stale pending session cleanup.
  - State mismatch rejection.
  - Popup opener callback forwarding.
  - Credential persistence and token boundary separation.
  
  ## Consequences
  
  - Auth flows fail closed when callback or state data is invalid.
  - Git and agent OIDC features can be evidenced independently while sharing adapter behavior.
  - The OIDC adapter SPEC remains the common contract for shell auth behavior.
