body: |-
  # ADR-1042: Native shell adapter contract
  
  ## Decision
  
  MdWrk native shells shall expose host capabilities through typed adapter APIs rather than direct shell-specific assumptions in client components. The Electron desktop bridge and future native bridges shall provide explicit capabilities for file open, file save, directory mount, filesystem operations, and host events.
  
  ## Scope
  
  - Host adapter detection and capability checks.
  - Desktop markdown file open and save flows.
  - Project directory mount, read, create, rename, delete, and move flows.
  - Host menu events such as open, mount, and save-active-file requests.
  
  ## Consequences
  
  - Client behavior can degrade clearly when native capabilities are unavailable.
  - Native shells can add capabilities without changing browser behavior.
  - Host adapters require SPEC coverage for API shape and failure states.
