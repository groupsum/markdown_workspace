body: |-
  # Context
  MdWrk extensions need common contribution surfaces for panes, panels, settings, view toolbars, icons, hooks, activation, diagnostics, and cross-plugin integration. Without a governed ownership boundary, each extension can define incompatible local conventions.

  # Decision
  Extension contribution surfaces are governed shared extension platform surfaces. `@mdwrk/extension-manifest` owns contribution metadata. `@mdwrk/extension-host` owns host-facing contracts. `@mdwrk/extension-runtime` owns activation, compatibility, persisted runtime state, and hook dispatch. First-party extensions consume these contracts and may not invent app-local pane or toolbar protocols.

  # Boundaries
  This decision does not require every extension to expose every contribution type. It requires exposed contributions to be declared through the shared contract and validated through conformance fixtures. Development-only extension defaults must not become production defaults unless explicitly governed.

  # Consequences
  Workspace extension behavior becomes portable, testable, and discoverable. Extension Manager, Workspace Files, Git Ops, Gemini Agent, Theme Studio, Language Pack Studio, and catalog fixtures can share validation and screenshot expectations.
