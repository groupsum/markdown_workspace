body: |-
  # ADR-1029: MdWrk desktop app boundary
  
  ## Decision
  
  MdWrk shall treat the desktop app as a first-class shell with its own filesystem, packaging, update, and persistence boundary. The desktop app may reuse the client UIX and extension runtime, but desktop-only capabilities must be explicit and must not leak into browser or PWA assumptions.
  
  ## Scope
  
  - Native shell startup, preload, and host APIs.
  - Folder mounting and filesystem-backed loading.
  - Desktop tabs and window persistence.
  - Development-only runtime extensions versus production defaults.
  - Desktop packaging and version visibility.
  
  ## Consequences
  
  - Desktop features require SPEC links and evidence separate from browser/PWA evidence.
  - Filesystem persistence is in scope for desktop; cloud persistence remains out of bounds unless a future ADR changes that.
