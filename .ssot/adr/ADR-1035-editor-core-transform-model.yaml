body: |-
  # ADR-1035: Editor core transform model
  
  ## Decision
  
  MdWrk shall keep markdown editing semantics in framework-independent editor core packages. React editor components shall adapt the core model for rendering, input, keyboard handling, and selection reporting without redefining markdown transforms.
  
  ## Scope
  
  - Markdown commands for inline formatting, lists, indentation, and task items.
  - Selection normalization, line and column calculations, and selection metadata.
  - History state, undo, redo, and history limits.
  - React keyboard and component adapters.
  
  ## Consequences
  
  - Editor behavior remains portable across shells and UI surfaces.
  - Core transform tests become the primary evidence for authoring semantics.
  - React tests must prove adapter behavior without replacing core semantics.
