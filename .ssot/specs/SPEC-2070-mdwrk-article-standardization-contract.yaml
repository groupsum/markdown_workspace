body: |-
  # MdWrk Article Standardization Contract
  
  ## Scope
  
  This SPEC governs standardized support sections and metadata headers for documentation and blog articles on the public lander.
  
  ## Requirements
  
  1. Doc pages shall expose appended answer blocks containing What this does, When to use it, How it works, Example, Common errors, and Related APIs when those sections are relevant to the page type.
  2. Blog posts shall expose appended article guide material that improves semantic retrieval without replacing the editorial article body.
  3. Standardized answer and guide sections shall be terminal article content after the primary article body, not prepended and not inserted inline before the user's main reading path.
  4. Related Docs and related article link text shall be professional, specific, and product-facing.
  5. Article enhancements shall preserve crawlable plain text, internal links, canonical metadata, and readable headings.
  6. Doc-by-doc and post-by-post standardization must avoid overstating support status and must keep MdWrk product terminology consistent.
  7. Docs and blog frontmatter shall conform to the shared article metadata JSON Schema.
  8. Excerpts are required metadata for every documentation and blog article.
  9. Article cards, page metadata descriptions, BlogPosting JSON-LD descriptions, and embedded metadata link descriptions shall use the article excerpt.
  10. A dedicated GitHub Actions workflow shall validate article metadata headers against the JSON Schema for relevant lander article and schema changes.
  
  ## Acceptance
  
  Feature rows covering docs standardization, blog standardization, appended answer placement, related-link copy, crawlable article text, metadata schema validation, excerpt-derived embedded metadata, and the CI article metadata gate must link to this SPEC.
