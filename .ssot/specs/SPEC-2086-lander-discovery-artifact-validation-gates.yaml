  # SPEC-2086: Lander Discovery Artifact Validation Gates
  
  ## Scope
  
  This SPEC defines fail-closed validation gates for generated portable lander discovery artifacts. It applies to `@mdwrk/lander-seo`, product hosts such as `apps/mdwrkcom`, and content packs that mirror generated artifacts.
  
  ## Requirements
  
  1. Validation shall compare generated artifacts against the compiled lander site rather than trusting file existence.
  2. Every indexable compiled page shall appear in sitemap XML, `llms.txt`, `llms-full.txt`, `content-index.json`, `semantic-index.json`, `content-registry.json`, and page-relevant JSON-LD graph output unless a governed exception exists.
  3. Noindex pages shall not appear in sitemap XML or indexable discovery projections.
  4. Canonical URLs shall agree across sitemap XML, content indexes, registry entries, JSON-LD graph IDs, Open Graph metadata, and page metadata.
  5. Robots output shall include configured AI crawler policies and shall reject localhost, loopback, or development port leakage.
  6. `llms-full.txt` shall include canonical URLs and rendered page text snippets for indexable pages.
  7. `content-index.json`, `semantic-index.json`, and `content-registry.json` shall agree on page identity, canonical URL, language, and robots disposition.
  8. `jsonld-graph.json` shall include deterministic WebSite and WebPage nodes for eligible pages and shall not claim unsupported product capabilities.
  9. Hreflang and alternate URL metadata, when present, shall agree across sitemap XML, page metadata, content registry entries, and JSON-LD language fields.
  10. Mirrored content-pack generated artifacts shall match the product host build output byte-for-byte or by an explicitly governed canonicalization rule.
  11. Validation diagnostics shall identify the artifact, page, and field that failed.
  12. CI gates shall fail when required discovery artifacts are missing, malformed, stale, contradictory, or generated by an app-local divergent algorithm.
  
  ## Acceptance
  
  Feature, test, claim, and evidence rows shall cover positive and negative validation cases for sitemap inclusion, noindex exclusion, robots crawler policy, LLM corpus coverage, content-index and registry agreement, semantic-index agreement, JSON-LD graph coverage, hreflang parity, mirrored content-pack artifacts, and development URL leakage.
