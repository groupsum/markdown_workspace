body: |-
  # Extension Manager Specification
  
  ## Purpose
  
  Define requirements for the Extension Manager extension.
  
  ## Requirements
  
  - The manager must list installed, bundled, imported, disabled, and incompatible extensions.
  - It must expose install, import, disable, enable, remove, and inspect flows.
  - It must render extension settings schemas consistently.
  - It must show compatibility and status without blocking unrelated extensions.
  - It must respect the shared extension platform specification.
  
  ## 2026 SSOT Coverage Update
  
  The extension manager shall govern installed, bundled, imported, disabled, incompatible, and catalog entries. It must expose install, import, disable, enable, remove, inspect, settings, permission, compatibility, health, and diagnostics flows.
  
  The manager surface must support pane-only workspace layouts, toolbar-controlled sidebar/split modes, schema-driven settings forms, persistence through runtime restarts, and accessibility obligations.
