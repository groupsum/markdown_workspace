body: |-
  # SPEC-2037: Markdown File Import Contract
  
  ## Requirements
  
  Markdown file import must accept supported markdown file types, preserve readable names, handle duplicate imports deterministically, apply encoding assumptions consistently, create or update workspace state predictably, and report validation or read failures to the user.
  
  ## Evidence
  
  Evidence must cover browser import, desktop host-open import, duplicate names, invalid input, imported project placement, and tab activation behavior.
