body: |-
  # Edit In Renderer Profile Contract
  
  ## Requirements
  
  The edit-in-renderer profile defines an all-in-one Markdown authoring surface where plaintext Markdown is the canonical source, rendered Markdown is a projection, and the same pane supports editing and previewing. The profile must include CommonMark, GFM, and MdWrk editing and previewing coverage. The profile must require source-preserving roundtrip behavior, cursor and selection preservation, blank and whitespace-only document preservation, repeated Enter handling, and rendered projection isolation from plaintext source updates. The rendered projection must never be used as the plaintext Markdown copy.
