body: |-
  # SPEC-2027: OIDC Browser Flow Contract
  
  ## Requirements
  
  Browser OIDC callback handling must return idle for routes without callback parameters, clear stale pending sessions, reject state mismatches, persist successful implicit-flow credentials, and forward callback parameters to an opener when completing inside a popup window.
  
  ## Evidence
  
  Evidence must cover idle callbacks, stale session cleanup, mismatch errors, credential storage, and popup messaging.
