body: |-
  # MdWrk Client Chrome Responsive Contract

  ## Purpose
  This specification defines responsive client chrome behavior for `@mdwrk/mdwrkspace`.

  ## Scope
  The contract applies to action rails, headers, footers, status bars, file tabs, settings icons, keyboard behavior, panes, split views, toolbars, PWA install state, retained version display, and screenshot proof.

  ## Requirements
  1. The client shall own app chrome behavior across browser, installed PWA, mobile PWA, desktop PWA, and retained client versions.
  2. Viewport and aspect-ratio bands shall be centralized in `apps/client/styles/base/viewports.css`.
  3. Mobile landscape split panes shall remain side-by-side.
  4. View toolbar and editor toolbar shall remain directly above the footer bar on mobile UI where the footer is visible.
  5. Footer and status surfaces shall hide or show according to the governed mobile portrait and landscape contract.
  6. Status footer text such as persistence and saved-state indicators shall be governed and removable when autosave owns the behavior.
  7. Action rail placement, reversal, minimization, and overflow shall use shared tokens and screenshot evidence.
  8. PWA install controls shall reflect installed state and shall not remain visible after installation.

  ## Verification
  Passing evidence shall include client build output, focused responsive tests, and screenshots covering all affected themes, viewports, modes, panes, and modals.
