body: |-
  # SPEC-2031: Browser E2E Conformance Matrix
  
  ## Requirements
  
  Browser E2E conformance must verify shell boot, key chrome surfaces, inline HTML render, file-open baseline, preview/export reachability, settings and i18n reachability, and browser matrix probes for shell chrome, preview, and settings.
  
  ## Evidence
  
  Evidence must come from Playwright or equivalent browser automation and must identify the browser shell, route, viewport, and surface under test.
