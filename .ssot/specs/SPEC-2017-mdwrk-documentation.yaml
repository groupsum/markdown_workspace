body: |-
  # MdWrk Documentation Specification
  
  ## Purpose
  
  Define documentation requirements for new MdWrk behaviors.
  
  ## Requirements
  
  - Custom parser and previewer profile behavior must be documented.
  - Text wrap preview behavior must be documented.
  - Checkbox autocomplete behavior must be documented.
  - View toolbar behavior must be documented.
  - Extension authoring, compatibility, publishing, installation, disabling, removal, and options must be documented.
  - Documentation must state when behavior is browser, PWA, desktop, or extension-specific.
  
  ## 2026 SSOT Coverage Update
  
  Documentation must state when behavior is browser, PWA, Electron desktop, Android, extension-specific, or shared. Documentation must cover CM/GFM/CFM profile architecture, checkbox/list autocomplete, text wrap previewer behavior, view toolbar behavior, import/export behavior, zoom behavior, accessibility behavior, and extension authoring lifecycle.
  
  Docs must avoid claiming support for shell-specific behavior unless the matching SPEC, feature, tests, and evidence exist.
