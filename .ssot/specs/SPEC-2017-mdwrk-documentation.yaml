body: |-
  # MdWrk Documentation Specification
  
  ## Purpose
  
  Define documentation requirements for new MdWrk behaviors.
  
  ## Requirements
  
  - Custom parser and previewer profile behavior must be documented.
  - Text wrap preview behavior must be documented.
  - Checkbox autocomplete behavior must be documented.
  - View toolbar behavior must be documented.
  - Extension authoring, compatibility, publishing, installation, disabling, removal, and options must be documented.
  - Documentation must state when behavior is browser, PWA, desktop, or extension-specific.
