body: |-
  # SPEC-2058: Internal Workspace Markdown Link Resolution Contract
  
  ## Requirements
  
  Internal workspace Markdown link resolution must map relative, normalized, and basename Markdown destinations to workspace file IDs when possible. Unresolved internal links must fall back without corrupting workspace state.
  
  ## Evidence
  
  Evidence must include preview/export policy tests, React renderer link interception evidence, or explicit partial feature status where browser-level coverage is broad rather than behavior-specific.
