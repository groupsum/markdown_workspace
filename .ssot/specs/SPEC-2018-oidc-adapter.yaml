body: |-
  # OIDC Adapter Specification
  
  ## Purpose
  
  Define the shared adapter contract used by MdWrk OIDC integrations.
  
  ## Requirements
  
  - Each OIDC integration must have one targetable SSOT feature.
  - The shared OIDC adapter must isolate provider configuration, token acquisition, refresh, revocation, and failure handling.
  - Git OIDC and agent-extension OIDC must use separate scopes and storage namespaces.
  - OIDC tokens must not be shared across integrations unless a future ADR explicitly permits it.
  - The adapter must fail closed when configuration, redirect, token, or provider validation fails.
  - UI surfaces must report auth state without exposing tokens or provider secrets.
  - Persistence behavior must comply with the frontend state persistence specification.
  
  ## 2026 SSOT Coverage Update
  
  The OIDC adapter must define browser callback parsing, idle callback routes, stale pending session cleanup, state mismatch rejection, successful credential storage, popup opener messaging, provider configuration, token lifecycle, and fail-closed behavior.
  
  Each OIDC-consuming area must have its own feature, and each feature must link back to the shared adapter contract without merging token scopes.
