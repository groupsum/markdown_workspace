body: |-
  # SPEC-2062: Editor View Toolbar Responsive Behavior Contract

  ## Requirements

  The editor view toolbar must expose editor, split, preview, authoring command, table insertion, undo, and redo controls through stable icon-button surfaces. Toolbar behavior must be governed across desktop, mobile portrait, mobile landscape, narrow heights, wide aspect ratios, and split-view scenarios.

  The toolbar must preserve hidden-button preferences, active states, disabled states, divider grouping, command dispatch, split-view eligibility, split resizing affordances, and overflow or scrolling behavior without changing the current file content except through explicit editor commands.

  Split controls must respect viewport and orientation policy. Preview/editor mode controls must remain reachable in supported layouts. Compact and overflow states must preserve accessible labels or titles for icon-only controls.

  ## Evidence

  Evidence must cover responsive placement, active and disabled states, hidden controls, command dispatch, split eligibility, split resizing, overflow or scrolling behavior, and representative desktop/mobile/aspect-ratio viewing scenarios.
