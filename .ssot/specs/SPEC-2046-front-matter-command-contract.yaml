body: |-
  # SPEC-2046: Front Matter Command Contract
  
  ## Requirements
  
  The front matter editor command must insert a YAML front matter block at the document start only when one is not already present. The command belongs to the editor authoring default profile as an optional-profile authoring affordance and must not be treated as CommonMark or default GFM syntax.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
