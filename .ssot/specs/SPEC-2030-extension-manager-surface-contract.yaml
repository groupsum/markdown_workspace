body: |-
  # SPEC-2030: Extension Manager Surface Contract
  
  ## Requirements
  
  The extension manager must register bundled manager entries, render extension inventory, support pane-only workspace layout, expose sidebar and split controls, persist enabled-state toggles, render schema-driven settings, persist config values, and surface permissions, compatibility issues, health, and diagnostics.
  
  ## Evidence
  
  Evidence must cover manager registration, inventory rendering, layout controls, enabled-state persistence, settings persistence, permission reporting, compatibility reporting, and activation-failure diagnostics.
