body: |-
  # SPEC-2041: UI Zoom And Scale Contract
  
  ## Requirements
  
  UI zoom must support bounded increment, decrement, reset, and persisted user preference behavior. Chassis dimension tokens must remain independent from zoom scale while typography, icons, and controls continue to scale through shared UI scale tokens across themes.
  
  ## Evidence
  
  Evidence must cover minimum and maximum bounds, reset behavior, scale classes, token availability per theme, chassis independence, and user-facing control reachability.
