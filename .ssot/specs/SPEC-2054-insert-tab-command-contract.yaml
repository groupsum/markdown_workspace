body: |-
  # SPEC-2054: Insert Tab Command Contract
  
  ## Requirements
  
  The insert-tab command must route through the editor command model and follow the repository tab policy: structural indentation is the default authoring behavior while literal-space preferences may be added later.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
