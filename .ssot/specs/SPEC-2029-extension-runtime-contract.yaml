body: |-
  # SPEC-2029: Extension Runtime Contract

  ## Requirements

  The extension runtime must validate manifests, activate and deactivate extensions, persist namespaced configuration, reject incompatible extensions, isolate runtime errors, support lazy activation, and prevent one extension failure from breaking unrelated extensions.

  ## Evidence

  Evidence must cover manifest validation, lifecycle behavior, config persistence, compatibility rejection, error containment, and lazy activation.
