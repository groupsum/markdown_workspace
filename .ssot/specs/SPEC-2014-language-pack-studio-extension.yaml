body: |-
  # Language Pack Studio Extension Specification
  
  ## Purpose
  
  Define requirements for the Language Pack Studio extension.
  
  ## Requirements
  
  - Language packs must use stable locale IDs and token catalogs.
  - Sample packs must be importable and validate against the language-pack schema.
  - Studio edits must preserve missing-token diagnostics.
  - Settings and view surfaces must respect host i18n APIs.
  - Language Pack Studio must remain compatible with the shared extension platform.
