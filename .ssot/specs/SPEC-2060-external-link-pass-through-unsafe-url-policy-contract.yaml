body: |-
  # SPEC-2060: External Link Pass Through And Unsafe URL Policy Contract
  
  ## Requirements
  
  External link behavior must distinguish absolute URI schemes and protocol-relative links from workspace links. Unsafe URL-bearing attributes and destinations must follow the preview/export sanitization policy rather than bypassing renderer safety controls.
  
  ## Evidence
  
  Evidence must include preview/export policy tests, React renderer link interception evidence, or explicit partial feature status where browser-level coverage is broad rather than behavior-specific.
