body: |-
  # SPEC-2049: Inline Math Command Contract
  
  ## Requirements
  
  The inline math editor command must wrap selected text or seed an inline math placeholder using single-dollar delimiters. The command is optional-profile behavior and must not be included in CommonMark or default GFM claims.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
