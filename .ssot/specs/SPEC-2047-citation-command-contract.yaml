body: |-
  # SPEC-2047: Citation Command Contract
  
  ## Requirements
  
  The citation editor command must wrap or seed citation-key authoring syntax without claiming bibliography resolution. Citation behavior remains an optional/out-of-scope profile surface until direct evidence promotes it.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
