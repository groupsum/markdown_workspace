body: |-
  # SPEC-2022: Editor Core Command And Transform Contract
  
  ## Requirements
  
  Editor core must own markdown command and transform semantics for bold, unordered lists, task lists, indentation, outdentation, list continuation, task-list termination, selection metadata, history, undo, redo, and roundtrip behavior.
  
  ## Evidence
  
  Evidence must cover core command transforms, selection normalization, line and column calculations, history limits, undo/redo, and renderer/editor roundtrip behavior.
