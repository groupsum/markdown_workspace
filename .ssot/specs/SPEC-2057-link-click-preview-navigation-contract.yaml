body: |-
  # SPEC-2057: Link Click Preview Navigation Contract
  
  ## Requirements
  
  Preview link clicking must distinguish external links, same-document hash links, internal workspace Markdown links, and cross-file hash links. Same-document hash links must scroll the current preview without switching files; file links must navigate through workspace state when resolvable.
  
  ## Evidence
  
  Evidence must include preview policy tests, renderer link-interception tests, editor command tests where implemented, and explicit absent feature status where authoring behavior is planned but not yet built.
