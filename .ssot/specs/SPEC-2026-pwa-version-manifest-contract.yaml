body: |-
  # SPEC-2026: PWA Version Manifest Contract

  ## Requirements

  PWA version selection must default to latest, reuse valid saved selections, fall back when selected versions are missing or incompatible, and report update states consistently. Install, update, check, switch, auto-update, running version, selected version, installed version, latest version, and compatibility state must be visible in governed surfaces.

  ## Evidence

  Evidence must cover version selection, compatibility fallback, update-ready state, failed or blocked precedence, and settings/status presentation.
