body: |-
  # SPEC-2050: Block Math Command Contract
  
  ## Requirements
  
  The block math editor command must wrap selected text or seed a display math block using double-dollar delimiters. It is optional-profile authoring behavior and remains distinct from renderer typesetting support.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
