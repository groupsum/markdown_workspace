body: |-
  # MdWrk Extension Platform Specification

  ## Purpose

  Define general extension creation, compatibility, options, lifecycle, publishing, installing, importing, disabling, and removal requirements.

  ## Requirements

  - Extensions must declare manifest metadata, compatibility, contribution points, capabilities, settings schema, and view modes.
  - Extension types must be explicit and host-rendered through stable contracts.
  - Publishing must produce versioned, integrity-checkable artifacts.
  - Installing and importing must validate manifest compatibility before activation.
  - Disabling must preserve settings unless removal explicitly deletes them.
  - Removing must clean runtime registration and leave user data according to the extension retention policy.
  - Extension options must be schema-driven and persist through namespaced settings.

  ## 2026 SSOT Coverage Update

  Extension platform requirements shall include manifest compatibility gates, capability permissions, runtime isolation, schema-driven settings, settings namespaces, retention on disable versus remove, publishing/import/install/remove/disable flows, and lifecycle evidence.

  Extension UI surfaces must satisfy shell accessibility requirements and compose with command palette entries, action rail mappings, extension view modes, panes, compact states, and settings surfaces.
