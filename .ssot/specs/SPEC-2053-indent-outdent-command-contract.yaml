body: |-
  # SPEC-2053: Indent And Outdent Command Contract
  
  ## Requirements
  
  Indent and outdent commands must operate through the editor core command model, preserve selection coherently, and support structural Markdown authoring workflows. These commands are editor behavior rather than Markdown profile syntax.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
