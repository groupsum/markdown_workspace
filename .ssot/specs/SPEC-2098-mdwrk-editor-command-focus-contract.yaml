body: |-
  # MdWrk Editor Command Focus Contract
  
  ## Purpose
  This specification defines focus, selection, and command-integrity requirements for MdWrk editor packages.
  
  ## Scope
  The contract applies to `@mdwrk/markdown-editor-core`, `@mdwrk/markdown-editor-react`, and `@mdwrk/markdown-edit-in-renderer-react`.
  
  ## Requirements
  1. Toolbar controls shall dispatch package commands instead of applying ad hoc DOM or React mutations.
  2. Checkbox insertion shall create only the checkbox marker, preserve line and character focus, avoid jumping to the top of the document, and place the cursor after one whitespace.
  3. Checkbox toolbar activation shall not trigger italic state.
  4. Italic, underline, link, image, list, and indentation commands shall have isolated transforms and tests.
  5. Multi-word selection shall be preserved through command dispatch where the command semantics require it.
  6. Line-count bars shall align with editor content during vertical scroll.
  7. Rendered-flow editing shall preserve preview/editor parity, inline image behavior, text wrapping, and keyboard focus.
  
  ## Verification
  Passing evidence shall include editor-core transform tests, editor-react focus and toolbar tests, edit-in-renderer parity tests, and app-level smoke coverage for affected toolbar flows.
