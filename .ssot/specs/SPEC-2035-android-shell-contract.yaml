body: |-
  # SPEC-2035: Android Shell Contract
  
  ## Requirements
  
  The Android shell must define its Capacitor packaging flow, markdown file intent handling, storage model, visual keyboard behavior, supported native capabilities, unsupported capability states, and release evidence requirements before Android is promoted to supported status.
  
  ## Evidence
  
  Evidence must cover Capacitor prepare/release behavior, Android intent filters, mobile viewport behavior, file access constraints, and native-shell status reporting.
