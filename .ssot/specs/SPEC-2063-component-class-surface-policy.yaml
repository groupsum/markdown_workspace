body: |-
  # SPEC-2063: Component Class Surface Policy
  
  ## Requirements
  
  Governed app and extension component source must use named component classes and tokenized CSS contracts for shell, pane, editor, preview, settings, action rail, workspace, and extension surfaces. Tailwind-style utility class tokens are out of bounds in governed component source roots.
  
  Covered source roots must include app-owned component surfaces and first-party extension component surfaces that participate in the shared UIX shell. Disallowed patterns must include inline utility-token class fragments that bypass the governed class-name and token contract.
  
  Conformance evidence must include a repository test lane that scans governed component source for disallowed utility-token patterns and fails when new violations are introduced.
  
  ## Evidence
  
  Evidence must cover governed source-root selection, disallowed utility-token detection, passing component class policy tests, and representative app and extension component surfaces that remain on named class-name contracts.
