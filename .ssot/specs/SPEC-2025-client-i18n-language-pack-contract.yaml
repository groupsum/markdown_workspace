body: |-
  # SPEC-2025: Client I18N And Language Pack Contract
  
  ## Requirements
  
  Client i18n must support stable locale snapshots, catalog registration, namespace loading, locale fallback, persisted locale selection, shared core shell catalogs, portable language pack import, activation, export, disable, enable, remove, and fallback to English when required.
  
  ## Evidence
  
  Evidence must cover catalog resolution, fallback behavior, persistence, built-in packs, portable pack lifecycle, and settings reachability.
