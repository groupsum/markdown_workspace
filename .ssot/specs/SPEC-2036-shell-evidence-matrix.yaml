body: |-
  # SPEC-2036: Shell Evidence Matrix
  
  ## Requirements
  
  Shell evidence must be tracked per shell and per capability. Browser, PWA, Electron desktop, and Android evidence must not be conflated when persistence, filesystem, install/update, viewport, or native host behavior differs.
  
  ## Evidence
  
  Evidence rows must identify shell, viewport or host target, capability, test kind, pass status, and linked feature or claim where available.
