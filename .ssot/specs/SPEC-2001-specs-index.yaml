body: |-
  # SSOT Specs Index
  
  This SSOT registry directory is the canonical home for repository specifications and standards.
  
  ## Index
  
  - `.ssot/specs/SPEC-2002-repository-governance.yaml` - CI-enforced governance rules for repository structure, documentation pointers, root cleanliness, generated artifacts, claim language, WIP notes, release-note hygiene, and SSOT-only SPEC authority.
  
  ## How Specs Are Used
  
  - SPEC records are maintained under `.ssot/specs/` and tracked in `.ssot/registry.json`.
  - Validation scripts under `tools/governance/` enforce these requirements.
  - CI runs all governance checks through `npm run ci:governance`.
  - Validation failures include explicit pointers back to the relevant SSOT SPEC file.
  - No parallel top-level `specs/` directory is allowed.
