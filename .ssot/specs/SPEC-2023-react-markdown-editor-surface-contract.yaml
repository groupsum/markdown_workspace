body: |-
  # SPEC-2023: React Markdown Editor Surface Contract
  
  ## Requirements
  
  The React editor surface must adapt editor core behavior without redefining core markdown semantics. It must support controlled and uncontrolled rendering, optional line-number gutter display, selection format-state emission, keyboard shortcuts, indentation keys, list continuation, and task-list termination.
  
  ## Evidence
  
  Evidence must cover component rendering modes, gutter suppression, selection events, and keyboard behavior.
