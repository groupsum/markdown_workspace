body: |-
  # SPEC-2042: Accessibility Contract
  
  ## Requirements
  
  Accessibility requirements must cover keyboard reachability, focus order, focus restoration, modal semantics, command palette accessibility, ARIA labels, screen-reader names, status communication, contrast-sensitive token behavior, and extension UI obligations.
  
  ## Evidence
  
  Evidence must cover keyboard behavior, labels for interactive controls, modal and command palette behavior, extension settings forms, and any status announcements that can be tested reliably.
