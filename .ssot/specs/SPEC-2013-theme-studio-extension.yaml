body: |-
  # Theme Studio Extension Specification
  
  ## Purpose
  
  Define requirements for the Theme Studio extension.
  
  ## Requirements
  
  - Theme edits must map to supported theme tokens and CSS contracts.
  - Exported themes must be versioned and importable.
  - Theme relationship and preview behavior must be deterministic.
  - Theme settings must persist through extension-scoped settings.
  - Theme Studio must not bypass the shared UIX token contract.
