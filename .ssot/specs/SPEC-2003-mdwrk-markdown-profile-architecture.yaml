body: |-
  # MdWrk Markdown Profile Architecture Specification
  
  ## Purpose
  
  Define the parser and previewer profile architecture for CommonMark, GFM, and CFM.
  
  ## Requirements
  
  - CommonMark is the normative core profile.
  - GFM is the default product Markdown profile layered on CommonMark.
  - CFM custom parser behavior is additive and must be named.
  - CFM custom previewer behavior is a rendering policy and must not silently change parser semantics.
  - CFM means Custom Flavored Markdown and is the named custom additive profile.
  - Profile state must be visible in settings, export, preview, and conformance evidence.
  - A custom profile cannot broaden CommonMark or GFM claims unless its evidence lane proves that claim.
  
  ## 2026 SSOT Coverage Update
  
  Markdown profile architecture shall explicitly govern CM, GFM, and CFM as separate targetable profiles. CFM remains additive to CM and GFM and must not weaken external conformance claims.
  
  Profile state must be visible in settings, preview, export, and evidence surfaces when profile choice can affect parser, renderer, previewer, or generated artifact behavior. SPEC-2040 governs export profile disclosure.
