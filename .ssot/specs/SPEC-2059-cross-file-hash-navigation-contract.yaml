body: |-
  # SPEC-2059: Cross File Hash Navigation Contract
  
  ## Requirements
  
  Cross-file hash navigation must navigate to the resolved workspace Markdown file and preserve the requested hash until the destination preview can scroll to the matching heading or named anchor.
  
  ## Evidence
  
  Evidence must include preview/export policy tests, React renderer link interception evidence, or explicit partial feature status where browser-level coverage is broad rather than behavior-specific.
