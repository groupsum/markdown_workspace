body: |-
  # SPEC-2032: Shell Taxonomy And Runtime Detection
  
  ## Requirements
  
  MdWrk shell taxonomy must define browser, PWA, Electron desktop, and Capacitor Android support states. Runtime detection must produce stable shell labels, install/update visibility rules, capability detection results, and unsupported capability behavior.
  
  ## Evidence
  
  Evidence must cover runtime labels, PWA installed detection, desktop host capability detection, and shell-specific status or settings display rules.
