body: |-
  # SPEC-2051: Superscript Command Contract
  
  ## Requirements
  
  The superscript editor command must wrap selected text or seed superscript syntax for the optional superscript profile. It is not CommonMark or default GFM behavior.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
