body: |-
  # SPEC-2038: Workspace Import And Folder Mount Contract
  
  ## Requirements
  
  Workspace import and folder mount behavior must distinguish browser-imported projects from native filesystem-mounted projects. Mounted folders must preserve root paths, read directory snapshots, preserve file source paths, and support refresh or mutation through host adapters when available.
  
  ## Evidence
  
  Evidence must cover mounted folder open, filesystem-backed loading, imported workspace persistence, permission failure states, and open tab restoration.
