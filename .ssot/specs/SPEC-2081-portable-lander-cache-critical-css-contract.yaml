body: |-
  # Portable Lander Cache And Critical CSS Contract
  
  ## Purpose
  
  This specification defines the reusable cache freshness, validator, fingerprinted asset, header lookup, manifest, and critical CSS delivery contract for portable lander output.
  
  ## Resource Classes
  
  Portable lander builds shall classify generated resources as immutable, mutable-revalidate, or no-store.
  
  Immutable resources are generated subresources whose URL changes when content changes. Immutable resources include fingerprinted CSS, JavaScript, image, font, and static asset files.
  
  Mutable-revalidate resources are stable URLs whose content can change across builds. Mutable-revalidate resources include route HTML, root sitemap indexes, child sitemap URL sets, robots artifacts, LLM index artifacts, content indexes, semantic indexes, content registries, and JSON-LD graph artifacts unless a site profile explicitly fingerprints them.
  
  No-store resources are personalized or sensitive responses. Static public landers should rarely emit this class, but the class is reserved for hosts that need it.
  
  ## Cache Header Contract
  
  Immutable resources shall support Cache-Control with public caching, at least 2592000 seconds of max-age, and immutable semantics when the host supports it. The preferred immutable max-age is 31536000 seconds.
  
  Mutable-revalidate resources shall generally avoid positive max-age. They shall support Cache-Control: no-cache or an equivalent revalidation-required policy.
  
  Mutable-revalidate resources shall provide ETag and Last-Modified metadata. Immutable resources should also provide ETag and Last-Modified metadata for diagnostics, range support, and host compatibility.
  
  No-store resources shall use Cache-Control: no-store.
  
  ## Header Lookup Contract
  
  Reusable lander packages shall expose a portable cache header lookup helper. The helper shall accept a generated resource path or URL path and return intended headers derived from the cache manifest and resource classification rules.
  
  The lookup helper shall normalize query strings and fragments away before lookup. It shall support root-relative paths and stable generated artifact paths. It shall not require mdwrkcom-specific routes, absolute workstation paths, Docker Compose ports, or server-specific configuration.
  
  Downstream hosts may adapt the returned headers to nginx, CDN rules, static-host metadata, framework middleware, or tests, but they shall not need to reimplement classification rules to do so.
  
  ## Fingerprinted Assets
  
  Immutable resources shall use fingerprinted URLs derived from content or build-stable content hashes. Query-string versioning alone is not sufficient for the portable immutable asset contract.
  
  The lander build shall expose the final fingerprinted URL to HTML emitters and manifest exporters.
  
  ## Critical CSS Delivery
  
  Portable lander builds shall support an inline critical CSS artifact containing only first-viewport CSS required to prevent unstyled or unstable initial render.
  
  Portable lander builds shall support deferred full stylesheet delivery using preload activation or an equivalent non-render-blocking pattern. A noscript stylesheet fallback is required when JavaScript-based activation is used.
  
  The full stylesheet shall remain available as an immutable fingerprinted asset unless a profile explicitly marks it mutable-revalidate.
  
  ## Manifest Contract
  
  Portable lander builds shall be able to emit a machine-readable cache manifest. Each entry shall include path, cache class, content hash or validator hash, last modified timestamp, and intended headers.
  
  Root and child sitemap artifacts, robots files, LLM files, content indexes, semantic indexes, content registries, JSON-LD graph files, route HTML, and fingerprinted assets shall appear in the manifest when emitted by the build.
  
  Validation shall fail when a generated file lacks a cache class, when immutable resources are not fingerprinted, when mutable-revalidate resources receive long positive max-age by default, when required validators are missing, or when lookup helpers return headers that contradict the manifest.
  
