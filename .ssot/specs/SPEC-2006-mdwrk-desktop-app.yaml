body: |-
  # MdWrk Desktop App Specification
  
  ## Purpose
  
  Define desktop app requirements for MdWrk.
  
  ## Requirements
  
  - Desktop app behavior must fit the screen and keep app header/status surfaces fixed where specified.
  - Desktop tabs must preserve expected app-level navigation behavior.
  - Folder mounting and filesystem loading must use desktop filesystem APIs, not browser-only assumptions.
  - Runtime extensions may be development-only by default, but production defaults must be explicit.
  - Desktop version and shell identity must be visible where system configuration requires it.
  - Desktop evidence must be tracked separately from browser and PWA evidence when behavior diverges.
  
  ## 2026 SSOT Coverage Update
  
  The desktop app specification shall distinguish Electron desktop from other native shells. Electron desktop owns desktop packaging, preload/host API exposure, filesystem-backed workspace behavior, launch-file handling, and desktop evidence lanes.
  
  Native file open, save, folder mount, directory read, create, rename, delete, move, and host menu events must route through the host capability adapter contract. Desktop evidence must remain separate from browser, PWA, and Android evidence.
