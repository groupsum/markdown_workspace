body: |-
  # SPEC-2043: UIX Chassis Layout Contract

  ## Requirements

  The UIX chassis must define ownership for header, status footer, action rail, sidebar, tab strip, editor pane, preview pane, modal layer, and extension views. Fixed chrome must remain fixed where required, panes must own vertical scrolling, and layout class names and tokens must remain stable.

  ## Evidence

  Evidence must cover shell region placement, scroll ownership, tab behavior, sidebars, action rail state, split view, extension pane layout, and fixed fit-to-screen behavior.
