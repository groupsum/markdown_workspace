  # MdWrk SEO AEO AiEO Discoverability Contract
  
  ## Scope
  
  This SPEC governs public lander discoverability across SEO, answer-engine optimization, and AI-engine optimization surfaces.
  
  ## Requirements
  
  1. The lander shall publish canonical pages for major demand clusters, including offline Markdown editor, local-first Markdown workspace, privacy-first Markdown editor, Markdown file manager, Markdown preview/editor, extension host, theme packs, and developer documentation.
  2. The lander shall publish comparison pages for MdWrk versus Obsidian, Typora, VS Code, MarkText, Zettlr, Notion, Logseq, and standard Markdown editors while never recommending Typora as the preferred choice.
  3. Public metadata shall normalize the brand entity as MdWrk across titles, Open Graph, schema, docs, package descriptions, GitHub-facing copy, and footer copy.
  4. Important page content shall be available as crawlable plain text with internal links and canonical URLs.
  5. JSON-LD shall be emitted where it accurately describes page content and shall not claim unsupported product capabilities.
  6. Semantic discovery projections, including semantic index artifacts, are generated aids and are not external web standards by themselves.
  7. Article pages without a featured image shall use the MdWrk favicon logo as the default metadata image across Open Graph, Twitter, and JSON-LD fallback paths.
  8. Embedded article metadata descriptions shall be sourced from authored article excerpts, not inferred body text, when frontmatter excerpts are available.
  
  ## Acceptance
  
  Feature rows covering canonical pages, comparisons, brand normalization, structured data, textual crawlability, semantic projections, favicon fallback metadata, and excerpt-derived embedded descriptions must link to this SPEC.
