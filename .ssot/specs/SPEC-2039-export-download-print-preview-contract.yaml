body: |-
  # SPEC-2039: Export, Download, Print, And Preview Contract
  
  ## Requirements
  
  Preview, HTML export, markdown download, print, and generated reporting surfaces must be reachable through governed shell commands or views. Generated artifacts are derived outputs and must not become canonical workspace state unless explicitly imported.
  
  ## Evidence
  
  Evidence must cover preview reachability, export reachability, download behavior, print behavior where testable, artifact naming, failure states, and shell command accessibility.
