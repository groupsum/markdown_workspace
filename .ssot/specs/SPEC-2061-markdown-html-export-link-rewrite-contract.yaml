body: |-
  # SPEC-2061: Markdown To HTML Export Link Rewrite Contract
  
  ## Requirements
  
  HTML export must rewrite internal Markdown file links from .md or .markdown destinations to .html targets while preserving hash fragments. Hash-only and external links must remain stable under export.
  
  ## Evidence
  
  Evidence must include preview/export policy tests, React renderer link interception evidence, or explicit partial feature status where browser-level coverage is broad rather than behavior-specific.
