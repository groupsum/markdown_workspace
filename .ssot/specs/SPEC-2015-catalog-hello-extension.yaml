body: |-
  # Catalog Hello Extension Specification
  
  ## Purpose
  
  Define requirements for the Catalog Hello extension.
  
  ## Requirements
  
  - The extension must remain a minimal catalog and runtime smoke example.
  - It must validate manifest compatibility.
  - It must exercise extension installation and runtime registration without privileged capabilities.
  - It must be safe as a bundled example and as an imported catalog entry.
