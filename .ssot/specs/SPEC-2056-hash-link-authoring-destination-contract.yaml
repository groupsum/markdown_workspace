body: |-
  # SPEC-2056: Hash Link Authoring And Destination Contract
  
  ## Requirements
  
  Hash-link authoring must produce Markdown link destinations that target preview anchors, including same-document hash destinations and file-plus-hash destinations. Fragment destination syntax is valid Markdown, while anchor generation and workspace target resolution are application behavior.
  
  ## Evidence
  
  Evidence must include preview policy tests, renderer link-interception tests, editor command tests where implemented, and explicit absent feature status where authoring behavior is planned but not yet built.
