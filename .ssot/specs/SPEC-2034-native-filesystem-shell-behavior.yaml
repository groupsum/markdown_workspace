body: |-
  # SPEC-2034: Native Filesystem Shell Behavior
  
  ## Requirements
  
  Native filesystem shells must support markdown file open, markdown file save, launch-file import, project directory open, directory read, project directory creation, create directory, rename path, delete path, move path, and host-initiated save-active-file events where the host grants permission.
  
  ## Evidence
  
  Evidence must cover successful native operations, permission or validation failures, path preservation, mounted folder refresh behavior, and fallback behavior when the native host API is absent.
