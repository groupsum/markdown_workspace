body: |-
  # SPEC-2021: Toast And Notification Behavior Contract
  
  ## Requirements
  
  Toast and notification behavior must deduplicate repeated messages by relevant type, allow user dismissal, and avoid blocking shell or editor interaction. Notifications that communicate shell or extension state must remain accessible and predictable.
  
  ## Evidence
  
  Evidence must cover duplicate suppression, dismissal behavior, and notification behavior used by shell and extension flows.
