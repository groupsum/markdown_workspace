body: |-
  # SPEC-2048: Footnote Command Contract
  
  ## Requirements
  
  The footnote editor command must create footnote reference syntax for authoring. It must be governed separately from parser, preview, export, and backlink behavior, while remaining linkable to the optional footnotes profile.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
