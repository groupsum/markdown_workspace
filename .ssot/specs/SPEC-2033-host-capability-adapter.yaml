body: |-
  # SPEC-2033: Host Capability Adapter
  
  ## Requirements
  
  Host capability adapters must expose typed APIs for native features and must be discovered before use. Unsupported capabilities must fail with clear shell-visible states. Host adapters must not be required for browser and PWA-only behavior.
  
  ## Evidence
  
  Evidence must cover capability detection, missing-adapter failure states, host file actions, host directory actions, and host event subscriptions.
