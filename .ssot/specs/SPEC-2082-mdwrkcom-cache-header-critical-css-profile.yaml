body: |-
  ## Purpose

  This specification defines the mdwrkcom adoption profile for the portable lander cache freshness and critical CSS contract.

  ## mdwrkcom Resource Classification

  mdwrkcom generated assets under assets that use content-fingerprinted names shall be immutable. This includes the full static stylesheet once it is emitted through the portable fingerprinted asset pipeline.

  mdwrkcom route HTML shall be mutable-revalidate. Route HTML includes the home page, docs, features, comparisons, packages, proof pages, legal pages, trust pages, updates, answers, and localized routes.

  mdwrkcom discovery and machine-readable artifacts shall be mutable-revalidate unless the portable manifest explicitly fingerprints them. This includes sitemap.xml, robots.txt, llms.txt, llms-full.txt, content-index.json, content-registry.json, and jsonld-graph.json.

  mdwrkcom shall not apply positive max-age to mutable-revalidate resources by default. mdwrkcom mutable resources shall provide ETag and Last-Modified metadata for efficient conditional requests.

  ## mdwrkcom Critical CSS Boundary

  mdwrkcom critical CSS shall cover the first viewport only. The critical boundary includes root theme tokens required for first paint, document body background and foreground, skip/focus basics, header and navigation layout, home hero or route title layout, first-viewport typography, and contrast-critical token applications.

  mdwrkcom critical CSS shall not include full markdown body styling, lower-page cards, accordions, footer sections, comparison tables, update archives, or other below-the-fold surfaces unless those surfaces are rendered in the first viewport for a specific route profile.

  ## Deferred Stylesheet Delivery

  mdwrkcom generated HTML shall use the portable deferred full stylesheet pattern for the complete static stylesheet. The full stylesheet shall be referenced by fingerprinted immutable URL and shall include a noscript fallback.

  ## Content Pack Mirror

  The mdwrkcom content pack shall mirror generated cache manifest and header metadata artifacts whenever mdwrkcom exports them. The content pack smoke test shall verify that mirrored generated artifacts match the mdwrkcom build output.

  ## Validation

  mdwrkcom CI shall validate that generated HTML does not keep the full static stylesheet as a render-blocking request when the critical CSS profile is enabled.

  mdwrkcom CI shall validate that immutable assets have at least 30 days of cache freshness and that mutable-revalidate resources include ETag and Last-Modified metadata while avoiding default positive max-age.
