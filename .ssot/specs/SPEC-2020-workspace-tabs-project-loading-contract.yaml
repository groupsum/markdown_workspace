body: |-
  # SPEC-2020: Workspace Tabs And Project Loading Contract
  
  ## Requirements
  
  Workspace loading must prevent duplicate project loads, preserve desktop imported markdown sessions, and distinguish open tabs from persisted workspace files. Tab open, dedupe, close, active-tab fallback, and imported-file behavior must be deterministic across supported shells.
  
  ## Evidence
  
  Evidence must cover strict-mode project loading, repeated file opens, active tab fallback, desktop imported markdown, and workspace state restoration.
