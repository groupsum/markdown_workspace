body: |-
  # SPEC-2040: Export Profile Disclosure Contract
  
  ## Requirements
  
  Preview and export surfaces must disclose active CM, GFM, and CFM parser and previewer profiles whenever profile selection can affect output. Profile disclosure must be visible in reports or UI surfaces that claim conformance or generated artifact fidelity.
  
  ## Evidence
  
  Evidence must cover profile selection, preview disclosure, export disclosure, conformance reports, and failure labeling by parser, renderer, preview, export, or adapter boundary.
