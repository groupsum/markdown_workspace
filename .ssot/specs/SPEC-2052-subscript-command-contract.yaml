body: |-
  # SPEC-2052: Subscript Command Contract
  
  ## Requirements
  
  The subscript editor command must wrap selected text or seed subscript syntax for the optional subscript profile. It is not CommonMark or default GFM behavior.
  
  ## Evidence
  
  Evidence must include command transform tests, selection-state tests, React editor command dispatch tests, or explicit absent/partial feature status when behavior lacks direct proof.
