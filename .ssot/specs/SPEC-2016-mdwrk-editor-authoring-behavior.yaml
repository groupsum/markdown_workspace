body: |-
  # MdWrk Editor Authoring Behavior Specification
  
  ## Purpose
  
  Define editor authoring behaviors that need targetable SSOT features.
  
  ## Requirements
  
  - Ordered and unordered list continuation must typeahead on Enter and terminate on a second empty item.
  - Checkbox creation must preserve focus, line, and character position.
  - Text wrapping must be configurable where supported.
  - Underline behavior must not claim standard Markdown semantics unless a custom profile enables it.
  - Line count bars must be hideable and y-scroll aligned with editor content.
  - Visual keyboard mode must preserve editor usability on mobile.
