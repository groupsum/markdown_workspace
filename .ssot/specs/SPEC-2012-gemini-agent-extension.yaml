body: |-
  # Gemini Agent Extension Specification
  
  ## Purpose
  
  Define requirements for the Gemini Agent extension.
  
  ## Requirements
  
  - The extension must declare agent capabilities through the extension manifest.
  - Agent OIDC must be scoped to the agent extension.
  - Prompt, provider, service, settings, and view surfaces must be version-compatible with the host.
  - The extension must fail closed when required auth or provider configuration is missing.
  - The extension must respect user settings and disable/remove lifecycle rules.
