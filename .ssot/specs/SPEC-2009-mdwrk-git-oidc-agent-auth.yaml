body: |-
  # MdWrk Git, OIDC, and Agent Auth Specification
  
  ## Purpose
  
  Define Git operation persistence and authentication boundaries.
  
  ## Requirements
  
  - Git operation state must be recoverable after app reload where supported.
  - Git OIDC tokens must be scoped to Git operations.
  - Agent extension OIDC tokens must be scoped to the agent extension.
  - Git and agent auth state must not be shared without explicit user consent and a future ADR.
  - Auth status must not leak into unrelated UI surfaces.
  - Extension auth configuration must be disableable and removable with the extension.
