body: |-
  # SPEC-2019: Client Shell Registry Contract
  
  ## Requirements
  
  The client shell must compose commands, views, action rail entries, command palette entries, and extension workspace surfaces through registries. Main views must be exclusive when required, modal views must preserve modal open semantics, and rail interactions must route through centralized command or view toggle paths.
  
  ## Evidence
  
  Evidence must cover command execution, view open/close/toggle behavior, action rail active state, extension workspace placement, and shell chrome reachability.
