body: |-
  # MdWrk UIX Responsive Design Specification
  
  ## Purpose
  
  Define responsive UIX behavior across desktop, browser, PWA, mobile portrait, mobile landscape, tablets, and ultra-wide layouts.
  
  ## Requirements
  
  - CSS tokens must govern shared rail, pane, footer, header, breakpoint, compaction, and spacing values.
  - Expandable rails must be full width on mobile where specified and share tokenized alignment rules.
  - Panes must own vertical scrolling when bars and shell chrome remain fixed.
  - Mobile portrait may reverse action rail order through a theme-stable CSS token.
  - Mobile visual-keyboard mode must support half-screen working area behavior.
  - Mobile landscape may hide status footer surfaces when vertical space is constrained.
  - Ultra-wide layouts must preserve readable pane widths and explicit aspect-ratio rules.
  - Command palettes, extension views, panes, iconized controls, and compact modes must remain interoperable.
  
  ## 2026 SSOT Coverage Update
  
  UIX responsive design shall govern named chassis regions: header, status footer, action rail, sidebars, tab strip, editor panes, preview panes, modal layers, and extension views.
  
  UIX conformance includes zoom behavior, accessibility behavior, fixed shell chrome, pane-owned scrolling, iconized compaction, breakpoint tokens, visual-keyboard half-screen behavior, ultra-wide behavior, and shell-specific responsive matrix evidence.
