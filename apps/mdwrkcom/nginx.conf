server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    text/xml
    text/plain
    image/svg+xml;

  add_header Cache-Control "no-cache" always;

  location = /blog {
    return 301 /updates/;
  }

  location = /blog/ {
    return 301 /updates/;
  }

  location ~* ^/assets/.+\.[a-f0-9]{8,}\.(css|js|mjs|png|jpg|jpeg|webp|svg|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ~* ^/(sitemap\.xml|sitemap\.xsl|robots\.txt|llms(?:-full)?\.txt|content-index\.json|semantic-index\.json|content-registry\.json|jsonld-graph\.json|cache-header-manifest\.json|critical-path-manifest\.json)$ {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  location ~* ^/sitemaps/.+\.xml$ {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri/index.html $uri /index.html;
  }
}
