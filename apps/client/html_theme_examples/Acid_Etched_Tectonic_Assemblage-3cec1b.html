<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spiffpickle // Brutahaus Markdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Acid-Etched Tectonic Palette (Cyber Pickle Light) */
            --bg: #f4f6f0;
            --surface: #ffffff;
            --border: #111111;
            --pickle-acid: #ccff00;
            --pickle-deep: #2d3316;
            --pickle-muted: #8a966a;
            --text: #1a1a1a;
            --text-dim: #555555;
            --selection: #e2ff66;
            
            /* Sizing & Density Variables */
            --scale: 1;
            --top-bar-h: calc(32px * var(--scale));
            --footer-h: calc(24px * var(--scale));
            --toolbar-w: calc(40px * var(--scale));
            --explorer-w: calc(200px * var(--scale));
            --border-heavy: 2px;
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            
            /* Optical adjustment */
            --tracking: -0.02em;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: calc(13px * var(--scale));
            letter-spacing: var(--tracking);
        }

        button {
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }

        /* Layout Structure */
        .app-container {
            display: grid;
            grid-template-areas: 
                "top top top"
                "tool side main"
                "foot foot foot";
            grid-template-rows: var(--top-bar-h) 1fr var(--footer-h);
            grid-template-columns: var(--toolbar-w) auto 1fr;
            height: 100vh;
            border: var(--border-heavy) solid var(--border);
        }

        /* Top Bar */
        header {
            grid-area: top;
            background: var(--surface);
            border-bottom: var(--border-heavy) solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            justify-content: space-between;
            font-weight: 900;
            text-transform: uppercase;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pickle-icon {
            width: 14px;
            height: 14px;
            background: var(--pickle-acid);
            border: 1.5px solid var(--border);
            transform: rotate(15deg);
        }

        .filename-display {
            font-family: var(--font-mono);
            font-weight: 400;
            text-transform: none;
            font-size: 0.85rem;
            margin-left: 20px;
            color: var(--text-dim);
        }

        /* Left Toolbar */
        .toolbar {
            grid-area: tool;
            background: var(--surface);
            border-right: var(--border-heavy) solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap: 15px;
        }

        .tool-btn {
            width: 28px;
            height: 28px;
            border: 1px solid transparent;
        }

        .tool-btn:hover {
            background: var(--pickle-acid);
            border-color: var(--border);
        }

        .tool-btn.active {
            background: var(--border);
            color: var(--pickle-acid);
        }

        /* Explorer Sidebar */
        .explorer {
            grid-area: side;
            width: var(--explorer-w);
            background: var(--bg);
            border-right: var(--border-heavy) solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .explorer-header {
            padding: 8px 12px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
        }

        .tree-item {
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tree-item:hover {
            background: rgba(0,0,0,0.05);
        }

        .tree-item.folder::before {
            content: "+";
            font-weight: 900;
            font-size: 10px;
        }

        .tree-item.active {
            background: var(--surface);
            font-weight: 700;
            box-shadow: inset 4px 0 0 var(--pickle-acid);
        }

        /* Main Workspace */
        main {
            grid-area: main;
            display: flex;
            background: var(--surface);
            overflow: hidden;
            position: relative;
        }

        .pane {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        .editor-pane {
            border-right: calc(var(--border-heavy) / 2) solid var(--border);
        }

        .preview-pane {
            border-left: calc(var(--border-heavy) / 2) solid var(--border);
            background: var(--surface);
        }

        #markdown-input {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            resize: none;
            font-family: var(--font-mono);
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text);
            background: transparent;
        }

        /* Markdown Styling */
        .preview-content {
            max-width: 65ch;
            margin: 0 auto;
            line-height: 1.6;
        }

        .preview-content h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1rem;
            border-bottom: 4px solid var(--pickle-acid);
            display: inline-block;
        }

        .preview-content p {
            margin-bottom: 1rem;
        }

        .preview-content code {
            background: var(--bg);
            padding: 2px 4px;
            border: 1px solid var(--border);
            font-family: var(--font-mono);
            font-size: 0.9em;
        }

        /* Footer Bar */
        footer {
            grid-area: foot;
            background: var(--border);
            color: var(--bg);
            display: flex;
            align-items: center;
            padding: 0 12px;
            justify-content: space-between;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        .status-group {
            display: flex;
            gap: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--pickle-acid);
        }

        /* Resizer */
        .resizer-handle {
            width: 4px;
            background: var(--border);
            cursor: col-resize;
            transition: background 0.2s;
            z-index: 10;
        }

        .resizer-handle:hover {
            background: var(--pickle-acid);
        }

        /* Utilities */
        .hidden { display: none !important; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pane-content {
            animation: fadeIn 0.3s ease-out;
        }

    </style>
</head>
<body>

    <div class="app-container" id="app-root">
        
        <header>
            <div class="logo-area">
                <div class="pickle-icon"></div>
                <span>spiffpickle // v1.0.4-stable</span>
                <div class="filename-display" id="filename-ui">/home/docs/intro_brutahaus.md</div>
            </div>
            <div class="header-actions">
                <button onclick="changeZoom(-0.1)">-</button>
                <span style="margin: 0 10px; font-size: 0.7rem;">DENSITY</span>
                <button onclick="changeZoom(0.1)">+</button>
            </div>
        </header>

        <aside class="toolbar">
            <button class="tool-btn" title="New File">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <button class="tool-btn active" title="File Explorer" onclick="toggleSidebar()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="tool-btn" title="Split Screen" onclick="toggleSplit()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 3v18"/></svg>
            </button>
            <div style="flex-grow: 1;"></div>
            <button class="tool-btn" title="Export Markdown">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
            <button class="tool-btn" title="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </aside>

        <nav class="explorer" id="explorer-sidebar">
            <div class="explorer-header">
                <span>INDEXED_DB // LOCAL</span>
                <span>[+]</span>
            </div>
            <div class="tree-item folder">projects</div>
            <div class="tree-item folder">archive</div>
            <div class="tree-item active">intro_brutahaus.md</div>
            <div class="tree-item">schema_normalized.json</div>
            <div class="tree-item">quick-notes.md</div>
            <div class="tree-item">todo.md</div>
        </nav>

        <main id="workspace">
            <section class="pane editor-pane" id="editor-container">
                <textarea id="markdown-input" spellcheck="false"># Spiffpickle Brutahaus

Welcome to the **Spiffpickle** workspace. This is a high-density, tectonic UI designed for pure productivity.

## Normalized Schemas
This PWA uses a split IndexedDB and LocalStorage strategy:
- `idb.blobs`: Markdown source content
- `ls.config`: Client local configurations
- `ls.ui`: Layout state and window positions

### Key Actions
- `[CMD+S]` Save to IndexDB
- `[CMD+P]` Toggle Preview
- `[CMD+\]` Toggle Sidebar

javascript
const schema = {
  store: "files",
  keyPath: "id",
  indices: ["updatedAt", "slug"]
};


Everything here is sharp edges and heavy dividers. No Haus colors—only the acid pickle.
                </textarea>
            </section>
            
            <div class="resizer-handle" id="resizer"></div>

            <section class="pane preview-pane" id="preview-container">
                <div class="pane-content preview-content" id="preview-output">
                    <!-- Rendered MD goes here -->
                </div>
            </section>
        </main>

        <footer>
            <div class="status-group">
                <div class="status-item">
                    <div class="dot"></div>
                    IDB: CONNECTED
                </div>
                <div class="status-item">
                    UTF-8
                </div>
                <div class="status-item">
                    CHARS: <span id="char-count">642</span>
                </div>
            </div>
            <div class="status-group">
                <div class="status-item">
                    PWA: SYNCED [2.0.1]
                </div>
                <div class="status-item" style="color: var(--pickle-acid)">
                    AUTO-SAVE: ON
                </div>
            </div>
        </footer>

    </div>

    <script>
        const input = document.getElementById('markdown-input');
        const output = document.getElementById('preview-output');
        const charCount = document.getElementById('char-count');
        const sidebar = document.getElementById('explorer-sidebar');
        const previewPane = document.getElementById('preview-container');
        const resizer = document.getElementById('resizer');
        const root = document.documentElement;

        // Basic Markdown-ish Parser (Simplified for UI demo)
        function renderPreview() {
            let text = input.value;
            charCount.innerText = text.length;
            
            let html = text
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/`(.*)`/gim, '<code>$1</code>')
                .replace(/\n$/gim, '<br />');

            output.innerHTML = html.split('\n').map(p => {
                if(p.startsWith('<h') || p.startsWith('<pre')) return p;
                return `<p>${p}</p>`;
            }).join('');
        }

        input.addEventListener('input', renderPreview);
        window.addEventListener('load', renderPreview);

        // UI Toggles
        function toggleSidebar() {
            const currentW = getComputedStyle(root).getPropertyValue('--explorer-w').trim();
            if (currentW !== '0px') {
                root.style.setProperty('--explorer-w', '0px');
                sidebar.style.opacity = '0';
            } else {
                root.style.setProperty('--explorer-w', '200px');
                sidebar.style.opacity = '1';
            }
        }

        function toggleSplit() {
            previewPane.classList.toggle('hidden');
            resizer.classList.toggle('hidden');
        }

        // Density Scaling
        let currentScale = 1;
        function changeZoom(delta) {
            currentScale = Math.min(Math.max(0.7, currentScale + delta), 1.5);
            root.style.setProperty('--scale', currentScale);
        }

        // Resizable Panels (Simple logic)
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let offsetLeft = e.clientX - 40; // Subtract toolbar width
            let explorerW = parseInt(getComputedStyle(root).getPropertyValue('--explorer-w'));
            let editorWidth = e.clientX - 40 - explorerW;
            document.getElementById('editor-container').style.flex = `0 0 ${editorWidth}px`;
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.metaKey || e.ctrlKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    console.log('Spiffpickle: Saved to IndexDB schema.');
                    // Flash the pickle dot to show save
                    document.querySelector('.dot').style.background = '#fff';
                    setTimeout(() => document.querySelector('.dot').style.background = 'var(--pickle-acid)', 200);
                }
                if (e.key === 'b') {
                    e.preventDefault();
                    toggleSidebar();
                }
            }
        });
    </script>
</body>
</html>
