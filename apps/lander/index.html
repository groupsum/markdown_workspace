<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MdWrk</title>
    <meta name="description" content="MdWrk is a privacy-first, offline-capable Markdown workspace for writing, previewing, and managing Markdown on your device." />
    <meta name="application-name" content="MdWrk" />
    <meta name="apple-mobile-web-app-title" content="MdWrk" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <link rel="canonical" href="https://mdwrk.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="MdWrk" />
    <meta property="og:description" content="Write, preview, and manage Markdown in an offline-capable workspace that keeps your content on your device." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mdwrk.com/" />
    <meta property="og:site_name" content="MdWrk" />
    <meta property="og:image" content="https://mdwrk.com/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MdWrk privacy-first Markdown workspace" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MdWrk" />
    <meta name="twitter:description" content="Write, preview, and manage Markdown in an offline-capable workspace that keeps your content on your device." />
    <meta name="twitter:image" content="https://mdwrk.com/og-image.svg" />
    <meta name="twitter:image:alt" content="MdWrk privacy-first Markdown workspace" />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0f172a',
              surface: '#1e293b',
              primary: '#6366f1',
              secondary: '#10b981',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
            animation: {
              'blob': 'blob 7s infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
      html,
      body,
      #root {
        height: auto;
        min-height: 100%;
        width: 100%;
      }
      html {
        overflow-x: hidden;
        overflow-y: visible;
      }
      body {
        margin: 0;
        overflow-x: hidden;
        overflow-y: visible;
      }
      #root {
        overflow-x: hidden;
        overflow-y: visible;
      }
      main { overflow: visible; }
      body {
        background-color: #ffffff;
        color: #0f172a;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #0f172a;
        color: #f8fafc;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
      .prose sub { bottom: -0.25em; font-size: 75%; line-height: 0; position: relative; vertical-align: baseline; }
      .prose sup { top: -0.5em; font-size: 75%; line-height: 0; position: relative; vertical-align: baseline; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
</head>
  <body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-50 transition-colors duration-300">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
