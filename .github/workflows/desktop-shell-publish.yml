name: Desktop Shell Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        required: false
        default: desktop
        type: choice
        options:
          - desktop
          - android

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  publish-desktop:
    if: ${{ inputs.target == 'desktop' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
          - runner: windows-latest
            platform: windows
          - runner: macos-latest
            platform: darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm run ci:install

      - name: Publish shell artifacts
        env:
          MDWRK_SHELL_TARGET: desktop
          MDWRK_SHELL_PLATFORM: ${{ matrix.platform }}
          GH_TOKEN: ${{ github.token }}
        run: npm run ci:desktop:publish

  publish-android:
    if: ${{ inputs.target == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm run ci:install

      - name: Publish shell artifacts
        env:
          MDWRK_SHELL_TARGET: android
          GH_TOKEN: ${{ github.token }}
        run: npm run ci:desktop:publish
