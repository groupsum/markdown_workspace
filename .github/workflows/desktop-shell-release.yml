name: Desktop Shell Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish build artifacts to a GitHub release'
        required: false
        default: false
        type: boolean
      tag:
        description: 'Optional Git tag or release tag'
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  desktop-release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm run ci:install

      - name: Build release artifacts
        run: npm run ci:desktop:release

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-shell-${{ matrix.os }}
          path: apps/desktop/dist/**

  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm run ci:install

      - name: Build Android release artifact
        env:
          MDWRK_SHELL_TARGET: android
        run: npm run ci:desktop:release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-shell-android
          path: apps/desktop/android/app/build/outputs/**

  github-release:
    if: ${{ inputs.publish_release && inputs.tag != '' }}
    needs: [desktop-release, android-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: release-artifacts/**/*
