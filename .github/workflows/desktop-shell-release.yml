name: Desktop Shell Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish build artifacts to a GitHub release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  desktop-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
          - runner: windows-latest
            platform: windows
          - runner: macos-latest
            platform: darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm run ci:install

      - name: Build release artifacts
        env:
          MDWRK_SHELL_PLATFORM: ${{ matrix.platform }}
        run: npm run ci:desktop:release

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-shell-${{ matrix.platform }}
          path: |
            apps/desktop/dist/electron/**/*.AppImage
            apps/desktop/dist/electron/**/*.dmg
            apps/desktop/dist/electron/**/*.exe
            !apps/desktop/dist/electron/**/elevate.exe
            apps/desktop/dist/electron/**/*.zip

  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm run ci:install

      - name: Build Android release artifact
        env:
          MDWRK_SHELL_TARGET: android
        run: npm run ci:desktop:release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-shell-android
          path: |
            apps/desktop/dist/android/**/*.aab
            apps/desktop/dist/android/**/*.apk

  github-release:
    if: ${{ inputs.publish_release }}
    needs: [desktop-release, android-release]
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          NAME="MD workspace desktop ${VERSION}"
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "name=${NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.aab
            release-artifacts/**/*.apk
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            !release-artifacts/**/elevate.exe
            release-artifacts/**/*.zip
