name: Lander Article Metadata

on:
  push:
    branches:
      - master
    paths:
      - apps/mdwrkcom/data/article-metadata.schema.json
      - apps/mdwrkcom/data/markdown/blog/**
      - apps/mdwrkcom/data/markdown/docs/**
      - apps/mdwrkcom/package.json
      - apps/mdwrkcom/scripts/validate-article-metadata.mjs
      - .github/workflows/mdwrkcom-article-metadata.yml
  pull_request:
    paths:
      - apps/mdwrkcom/data/article-metadata.schema.json
      - apps/mdwrkcom/data/markdown/blog/**
      - apps/mdwrkcom/data/markdown/docs/**
      - apps/mdwrkcom/package.json
      - apps/mdwrkcom/scripts/validate-article-metadata.mjs
      - .github/workflows/mdwrkcom-article-metadata.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mdwrkcom-article-metadata-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate article metadata headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm run ci:install

      - name: Validate docs and blog metadata schema
        run: npm run validate:article-metadata -w apps/mdwrkcom
