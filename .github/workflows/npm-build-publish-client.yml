name: Client Build and Publish

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: shortlived
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm run ci:install

      - name: Build client
        env:
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_FQDN: ${{ vars.VITE_OIDC_FQDN || 'https://md.bz23.xyz' }}
          VITE_OIDC_CALLBACK_PATH: ${{ vars.VITE_OIDC_CALLBACK_PATH || '/auth/callback' }}
          CLIENT_RETAINED_SOURCE_DIR: apps/client/.retained-client
        run: npm run build:client

      - name: Upload retained client bundle
        uses: actions/upload-artifact@v4
        with:
          name: retained-client-dist
          path: apps/client/dist

      - name: Determine npm publish readiness
        id: publish_gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_ENABLED: ${{ vars.NPM_PUBLISH_ENABLED || 'false' }}
        run: |
          if [ -n "${NPM_TOKEN}" ] && [ "${NPM_PUBLISH_ENABLED}" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping npm publish because NPM_PUBLISH_ENABLED is not true or NPM_TOKEN is unavailable."
          fi

      - name: Publish to npm
        if: ${{ steps.publish_gate.outputs.ready == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace apps/client --access public

      - name: Skip npm publish
        if: ${{ steps.publish_gate.outputs.ready != 'true' }}
        run: echo "Client package build completed; npm publication was intentionally skipped."
