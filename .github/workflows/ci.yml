name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  discover:
    name: Discover workspace matrices
    runs-on: ubuntu-latest
    outputs:
      package_groups: ${{ steps.matrix.outputs.package_groups }}
      apps: ${{ steps.matrix.outputs.apps }}
      publishable_packages: ${{ steps.matrix.outputs.publishable_packages }}
      extension_artifacts: ${{ steps.matrix.outputs.extension_artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate matrices
        id: matrix
        run: node ./tools/ci/write-github-matrices.mjs

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-matrices
          path: artifacts/ci/matrices.json

  lint-typecheck:
    name: Lint and typecheck workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Lint workspace
        run: npm run ci:lint

      - name: Typecheck workspace
        run: npm run ci:typecheck

  package-matrix:
    name: Package group verify (${{ matrix.group.name }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.discover.outputs.package_groups) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Lint group
        run: npm run ${{ matrix.group.lint }}

      - name: Typecheck group
        run: npm run ${{ matrix.group.typecheck }}

      - name: Build group
        run: npm run ${{ matrix.group.build }}

      - name: Test group
        run: npm run ${{ matrix.group.test }}

  app-matrix:
    name: App verify (${{ matrix.app.path }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Lint app
        run: npm run ${{ matrix.app.lint }}

      - name: Typecheck app
        run: npm run ${{ matrix.app.typecheck }}

      - name: Build app
        run: npm run ${{ matrix.app.build }}

      - name: Test app
        if: ${{ matrix.app.test != '' }}
        run: npm run ${{ matrix.app.test }}

  integration:
    name: Integration smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Run integration smoke
        run: npm run test:integration

      - name: Upload integration evidence
        uses: actions/upload-artifact@v4
        with:
          name: integration-smoke
          path: artifacts/ci/integration-smoke.json

  e2e:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Run end-to-end smoke
        run: npm run test:e2e

      - name: Upload end-to-end evidence
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke
          path: artifacts/ci/e2e-smoke.json

  visual:
    name: Visual smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Run visual smoke
        run: npm run test:visual

      - name: Upload visual evidence
        uses: actions/upload-artifact@v4
        with:
          name: visual-smoke
          path: artifacts/ci/visual-smoke.json

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Generate conformance artifacts
        run: npm run conformance

      - name: Upload conformance evidence
        uses: actions/upload-artifact@v4
        with:
          name: conformance-evidence
          path: artifacts/conformance/latest
