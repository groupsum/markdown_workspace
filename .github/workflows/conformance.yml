name: Conformance

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate workspace matrices
        run: npm run ci:package-matrices

      - name: Run integration smoke
        run: npm run test:integration

      - name: Run end-to-end smoke
        run: npm run test:e2e

      - name: Run visual smoke
        run: npm run test:visual

      - name: Run conformance validators
        run: npm run conformance

      - name: Upload conformance bundle
        uses: actions/upload-artifact@v4
        with:
          name: conformance-bundle
          path: |
            artifacts/ci
            artifacts/conformance/latest
