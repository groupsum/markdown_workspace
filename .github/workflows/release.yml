name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional git tag or release tag name'
        required: false
        type: string
      create_github_release:
        description: 'Create a GitHub release and attach the evidence bundle'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Prepare release artifacts
        run: npm run release:prepare

      - name: Tar release evidence
        run: tar -czf release-evidence.tgz artifacts/conformance artifacts/extensions artifacts/packs artifacts/releases

      - name: Upload release evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: |
            release-evidence.tgz
            artifacts/conformance
            artifacts/extensions
            artifacts/packs
            artifacts/releases

      - name: Attest release evidence provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: release-evidence.tgz

      - name: Create GitHub release
        if: ${{ inputs.create_github_release && inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: release-evidence.tgz
          generate_release_notes: true
