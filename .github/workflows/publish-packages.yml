name: Publish Packages

on:
  push:
    branches:
      - master
    paths:
      - '.changeset/**'
      - 'apps/client/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm run ci:install

      - name: Verify workspace
        run: npm run ci:workspace:verify:publish

      - name: Pack publishable workspaces
        run: npm run pack:packages

      - name: Generate release evidence
        run: npm run release:evidence

      - name: Validate release PR token configuration
        run: |
          if [ -z "${{ secrets.CHANGESETS_GITHUB_TOKEN }}" ]; then
            echo "::warning::CHANGESETS_GITHUB_TOKEN is not configured. Falling back to GITHUB_TOKEN, which cannot create pull requests when 'Allow GitHub Actions to create and approve pull requests' is disabled in repository/org settings."
          else
            echo "Using CHANGESETS_GITHUB_TOKEN for release PR creation."
          fi

      - name: Create or update release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run release:version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN != '' && secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN != '' && secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine npm publish readiness
        id: publish_gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_ENABLED: ${{ vars.NPM_PUBLISH_ENABLED || 'false' }}
        run: |
          if [ -n "${NPM_TOKEN}" ] && [ "${NPM_PUBLISH_ENABLED}" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "NPM publishing is enabled for this workflow run."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            if [ -z "${NPM_TOKEN}" ]; then
              echo "NPM_TOKEN is not configured; npm publication will be skipped."
            fi
            if [ "${NPM_PUBLISH_ENABLED}" != "true" ]; then
              echo "Set repository variable NPM_PUBLISH_ENABLED=true to enable npm publication in CI."
            fi
          fi

      - name: Publish packages to npm
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && steps.publish_gate.outputs.ready == 'true' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_ENABLED: 'true'
        run: npm run publish:packages

      - name: Skip npm publish
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && steps.publish_gate.outputs.ready != 'true' }}
        run: echo "Package publication skipped after versioning/evidence generation because npm publishing is not enabled for this repository."

      - name: Upload package publish evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-publish-evidence
          path: |
            artifacts/packs
            artifacts/releases/latest
            artifacts/releases/latest/publish-readiness.json
