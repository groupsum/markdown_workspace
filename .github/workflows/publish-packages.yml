name: Publish Packages

on:
  push:
    branches:
      - master
    paths:
      - '.changeset/**'
      - 'apps/client/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm run ci:install

      - name: Verify workspace
        run: npm run ci:workspace:verify:publish

      - name: Pack publishable workspaces
        run: npm run pack:packages

      - name: Generate release evidence
        run: npm run release:evidence

      - name: Create or update release pull request
        id: changesets
        if: ${{ secrets.CHANGESETS_GITHUB_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          version: npm run release:version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}

      - name: Version packages directly on default branch (no PR token)
        id: changesets_direct
        if: ${{ secrets.CHANGESETS_GITHUB_TOKEN == '' }}
        run: |
          echo "CHANGESETS_GITHUB_TOKEN is not configured; using direct versioning mode without creating a pull request."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm run release:version

          if [ -z "$(git status --porcelain)" ]; then
            echo "hasChangesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets found."
            exit 0
          fi

          git add -A
          git commit -m "chore(release): version packages"
          git push
          echo "hasChangesets=true" >> "$GITHUB_OUTPUT"
          echo "Version updates committed directly to ${GITHUB_REF_NAME}."

      - name: Resolve changesets state
        id: changesets_state
        run: |
          if [ -n "${{ steps.changesets.outputs.hasChangesets }}" ]; then
            echo "hasChangesets=${{ steps.changesets.outputs.hasChangesets }}" >> "$GITHUB_OUTPUT"
          else
            echo "hasChangesets=${{ steps.changesets_direct.outputs.hasChangesets }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine npm publish readiness
        id: publish_gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_ENABLED: ${{ vars.NPM_PUBLISH_ENABLED || 'false' }}
        run: |
          if [ -n "${NPM_TOKEN}" ] && [ "${NPM_PUBLISH_ENABLED}" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "NPM publishing is enabled for this workflow run."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            if [ -z "${NPM_TOKEN}" ]; then
              echo "NPM_TOKEN is not configured; npm publication will be skipped."
            fi
            if [ "${NPM_PUBLISH_ENABLED}" != "true" ]; then
              echo "Set repository variable NPM_PUBLISH_ENABLED=true to enable npm publication in CI."
            fi
          fi

      - name: Publish packages to npm
        if: ${{ steps.changesets_state.outputs.hasChangesets == 'false' && steps.publish_gate.outputs.ready == 'true' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_ENABLED: 'true'
        run: npm run publish:packages

      - name: Skip npm publish
        if: ${{ steps.changesets_state.outputs.hasChangesets == 'false' && steps.publish_gate.outputs.ready != 'true' }}
        run: echo "Package publication skipped after versioning/evidence generation because npm publishing is not enabled for this repository."

      - name: Upload package publish evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-publish-evidence
          path: |
            artifacts/packs
            artifacts/releases/latest
            artifacts/releases/latest/publish-readiness.json
