name: Docker Compose Restart (MdWrk.com)

on:
  push:
    branches:
      - master
    paths:
      - apps/mdwrkcom/**
      - packages/**
      - package.json
      - package-lock.json
      - tsconfig.base.json
      - docker-compose.yml
  workflow_dispatch:
    inputs:
      reason:
        description: Manual deployment reason
        required: false
        type: string

concurrency:
  group: dist-docker-restart-mdwrkcom
  cancel-in-progress: false

jobs:
  restart-mdwrkcom:
    runs-on: deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build MdWrk.com image
        env:
          VITE_DEMO_URL: ${{ vars.VITE_DEMO_URL || 'https://app.mdwrk.com' }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL || 'https://app.mdwrk.com' }}
          VITE_GITHUB_URL: ${{ vars.VITE_GITHUB_URL || 'https://github.com/groupsum/markdown_workspace' }}
          VITE_X_URL: ${{ vars.VITE_X_URL || 'https://x.com/swarmauri' }}
          VITE_COMMUNITY_URL: ${{ vars.VITE_COMMUNITY_URL || 'https://community.example.com' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://mdwrk.com' }}
          VITE_GITHUB_REPO_URL: ${{ vars.VITE_GITHUB_REPO_URL || 'https://github.com/groupsum/markdown_workspace' }}
          VITE_NPM_REPO_URL: ${{ vars.VITE_NPM_REPO_URL || 'https://www.npmjs.com/org/mdwrk' }}
          VITE_NPM_CLIENT_VERSION: ${{ vars.VITE_NPM_CLIENT_VERSION || '1.4.23' }}
          VITE_NPM_PACKAGE_NAME: ${{ vars.VITE_NPM_PACKAGE_NAME || '@mdwrk/mdwrkspace' }}
          VITE_NPM_PACKAGE_PATH: ${{ vars.VITE_NPM_PACKAGE_PATH || 'mdwrk/mdwrkspace' }}
          VITE_NPM_ESM_CDN_URL: ${{ vars.VITE_NPM_ESM_CDN_URL || 'https://esm.sh/@mdwrk/mdwrkspace' }}
        run: docker-compose build lander

      - name: Stop lander container
        continue-on-error: true
        run: docker-compose stop lander

      - name: Remove lander container
        continue-on-error: true
        run: docker-compose rm -f lander

      - name: Restart lander container from verified build
        env:
          VITE_DEMO_URL: ${{ vars.VITE_DEMO_URL || 'https://app.mdwrk.com' }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL || 'https://app.mdwrk.com' }}
          VITE_GITHUB_URL: ${{ vars.VITE_GITHUB_URL || 'https://github.com/groupsum/markdown_workspace' }}
          VITE_X_URL: ${{ vars.VITE_X_URL || 'https://x.com/swarmauri' }}
          VITE_COMMUNITY_URL: ${{ vars.VITE_COMMUNITY_URL || 'https://community.example.com' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://mdwrk.com' }}
          VITE_GITHUB_REPO_URL: ${{ vars.VITE_GITHUB_REPO_URL || 'https://github.com/groupsum/markdown_workspace' }}
          VITE_NPM_REPO_URL: ${{ vars.VITE_NPM_REPO_URL || 'https://www.npmjs.com/org/mdwrk' }}
          VITE_NPM_CLIENT_VERSION: ${{ vars.VITE_NPM_CLIENT_VERSION || '1.4.23' }}
          VITE_NPM_PACKAGE_NAME: ${{ vars.VITE_NPM_PACKAGE_NAME || '@mdwrk/mdwrkspace' }}
          VITE_NPM_PACKAGE_PATH: ${{ vars.VITE_NPM_PACKAGE_PATH || 'mdwrk/mdwrkspace' }}
          VITE_NPM_ESM_CDN_URL: ${{ vars.VITE_NPM_ESM_CDN_URL || 'https://esm.sh/@mdwrk/mdwrkspace' }}
        run: |
          docker rm -f markdown_workspace_lander || true
          docker-compose up -d --no-build --force-recreate --no-deps lander

      - name: Reload local proxy manager
        run: |
          proxy_containers="$(
            {
              docker ps --filter ancestor=jc21/nginx-proxy-manager --format '{{.ID}}'
              docker ps --filter label=com.docker.compose.project=nginx-proxy-manager --format '{{.ID}}'
              docker ps --filter label=com.docker.compose.project=nginxproxymanager --format '{{.ID}}'
              docker ps --format '{{.ID}} {{.Names}}' | grep -Ei '(^|[[:space:]])[^[:space:]]*[-_](nginx-proxy-manager|npm|openresty|proxy)([-_]|$)' | awk '{print $1}'
            } | sort -u
          )"
          if [ -n "${proxy_containers}" ]; then
            printf '%s\n' "${proxy_containers}" | while IFS= read -r container_id; do
              docker kill -s HUP "${container_id}" >/dev/null 2>&1 || docker restart "${container_id}" >/dev/null 2>&1 || true
            done
            echo "Proxy manager reload attempted."
          else
            echo "No local proxy manager container matched the safe reload pattern."
          fi

      - name: Prune unused docker images after successful restart
        continue-on-error: true
        run: docker system prune -af
