name: Docker Compose Restart (Client)

on:
  push:
    branches:
      - master
    paths:
      - apps/client/**
      - packages/**
      - package.json
      - package-lock.json
      - tsconfig.base.json
      - docker-compose.yml
  workflow_dispatch:
    inputs:
      reason:
        description: Manual deployment reason
        required: false
        type: string

concurrency:
  group: dist-docker-restart-client
  cancel-in-progress: false

jobs:
  restart-client:
    runs-on: deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build client image
        env:
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_FQDN: ${{ vars.VITE_OIDC_FQDN || 'https://md.bz23.xyz' }}
          VITE_OIDC_CALLBACK_PATH: ${{ vars.VITE_OIDC_CALLBACK_PATH || '/auth/callback' }}
        run: docker-compose build client

      - name: Stop client container
        continue-on-error: true
        run: docker-compose stop client

      - name: Remove client container
        continue-on-error: true
        run: docker-compose rm -f client

      - name: Prune docker images
        continue-on-error: true
        run: docker system prune -af

      - name: Restart client container from verified build
        env:
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_FQDN: ${{ vars.VITE_OIDC_FQDN || 'https://md.bz23.xyz' }}
          VITE_OIDC_CALLBACK_PATH: ${{ vars.VITE_OIDC_CALLBACK_PATH || '/auth/callback' }}
        run: docker-compose up -d --no-build --force-recreate --no-deps client
