name: Publish Extensions

on:
  push:
    branches:
      - master
    paths:
      - 'packages/extensions/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: publish-extensions-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  bundle-extensions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension packages
        run: npm run build:extensions

      - name: Generate browser-installable extension artifacts
        run: npm run extension:bundle

      - name: Generate integrity metadata
        run: npm run extension:sign

      - name: Validate extension artifacts
        run: npm run validate:extension-artifacts

      - name: Tar extension artifacts
        run: tar -czf extension-artifacts.tgz artifacts/extensions

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-artifacts
          path: |
            extension-artifacts.tgz
            artifacts/extensions
            artifacts/conformance/latest/extension-artifact-integrity.json
            artifacts/conformance/latest/extension-artifact-validation.json
            artifacts/conformance/latest/extension-trust-policy.json

      - name: Attest extension artifact provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: extension-artifacts.tgz
