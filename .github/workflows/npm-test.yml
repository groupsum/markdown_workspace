name: NPM Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: shortlived
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --install-strategy=nested

      - name: Run tests
        run: npm run test
