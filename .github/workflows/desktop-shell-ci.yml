name: Desktop Shell CI

on:
  push:
    branches:
      - master
    paths:
      - 'apps/client/**'
      - 'apps/desktop/**'
      - 'tools/ci/build-desktop-shell.mjs'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'apps/client/**'
      - 'apps/desktop/**'
      - 'tools/ci/build-desktop-shell.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm run ci:install

      - name: Typecheck desktop shell
        run: npm run typecheck:desktop

      - name: Build desktop shell
        run: npm run ci:desktop:build

  android-apk-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm run ci:install

      - name: Build Android release APK
        env:
          MDWRK_SHELL_TARGET: android
        run: npm run ci:desktop:release

      - name: Resolve APK metadata
        id: apk_meta
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH=$(find apps/desktop/dist/android -type f -name '*.apk' | head -n 1)
          if [[ -z "${APK_PATH}" ]]; then
            echo "No APK generated under apps/desktop/dist/android" >&2
            exit 1
          fi

          BUILD_TOOLS_DIR=$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          if [[ -z "${BUILD_TOOLS_DIR}" ]]; then
            echo "Android build-tools directory not found under ${ANDROID_HOME}/build-tools" >&2
            exit 1
          fi

          BADGING="$(${BUILD_TOOLS_DIR}/aapt dump badging "${APK_PATH}")"
          APP_ID=$(printf '%s\n' "${BADGING}" | sed -n "s/^package: name='\([^']*\)'.*/\1/p" | head -n 1)
          LAUNCHABLE_ACTIVITY=$(printf '%s\n' "${BADGING}" | sed -n "s/^launchable-activity: name='\([^']*\)'.*/\1/p" | head -n 1)

          if [[ -z "${APP_ID}" ]]; then
            echo "Unable to extract app id from APK badging" >&2
            exit 1
          fi

          {
            echo "apk_path=${APK_PATH}"
            echo "build_tools_dir=${BUILD_TOOLS_DIR}"
            echo "app_id=${APP_ID}"
            echo "launchable_activity=${LAUNCHABLE_ACTIVITY}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify APK structure and signature
        shell: bash
        run: |
          set -euo pipefail

          BUILD_TOOLS_DIR="${{ steps.apk_meta.outputs.build_tools_dir }}"
          SOURCE_APK="${{ steps.apk_meta.outputs.apk_path }}"
          VERIFY_APK="${SOURCE_APK}"

          if [[ "${SOURCE_APK}" == *"-unsigned.apk" ]]; then
            DEBUG_KEYSTORE="${HOME}/.android/debug.keystore"
            if [[ ! -f "${DEBUG_KEYSTORE}" ]]; then
              mkdir -p "$(dirname "${DEBUG_KEYSTORE}")"
              keytool -genkeypair \
                -keystore "${DEBUG_KEYSTORE}" \
                -storepass android \
                -keypass android \
                -alias androiddebugkey \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
            fi

            VERIFY_APK="$(dirname "${SOURCE_APK}")/$(basename "${SOURCE_APK}" .apk)-ci-signed.apk"
            "${BUILD_TOOLS_DIR}/apksigner" sign \
              --ks "${DEBUG_KEYSTORE}" \
              --ks-key-alias androiddebugkey \
              --ks-pass pass:android \
              --key-pass pass:android \
              --out "${VERIFY_APK}" \
              "${SOURCE_APK}"
          fi

          "${BUILD_TOOLS_DIR}/zipalign" -c -p 4 "${VERIFY_APK}"
          "${BUILD_TOOLS_DIR}/apksigner" verify --verbose --print-certs "${VERIFY_APK}"
          echo "verify_apk_path=${VERIFY_APK}" >> "$GITHUB_ENV"

      - name: Boot Android emulator and smoke-test APK launch
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            set -eu
            adb wait-for-device
            adb install -r "${verify_apk_path:-${{ steps.apk_meta.outputs.apk_path }}}"

            if [[ -n "${{ steps.apk_meta.outputs.launchable_activity }}" ]]; then
              adb shell am start -W -n "${{ steps.apk_meta.outputs.app_id }}/${{ steps.apk_meta.outputs.launchable_activity }}"
            else
              adb shell monkey -p "${{ steps.apk_meta.outputs.app_id }}" -c android.intent.category.LAUNCHER 1
            fi

            sleep 8
            PID=$(adb shell pidof "${{ steps.apk_meta.outputs.app_id }}" | tr -d '\r' || true)
            if [[ -z "${PID}" ]]; then
              echo "App process did not remain running after launch" >&2
              adb logcat -d | tail -n 200
              exit 1
            fi

            adb shell am force-stop "${{ steps.apk_meta.outputs.app_id }}"
