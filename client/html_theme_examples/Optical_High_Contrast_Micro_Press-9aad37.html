<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spiffpickle // micro-press</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accent: #ff3c00;
            --border-width: 2px;
            --bar-size: 32px;
            --sidebar-width: 200px;
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --scale: 1;
            --panel-shadow: 4px 4px 0px #000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-ui);
            font-size: calc(12px * var(--scale));
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-areas: 
                "top top top"
                "nav side main"
                "footer footer footer";
            grid-template-rows: var(--bar-size) 1fr var(--bar-size);
            grid-template-columns: var(--bar-size) var(--sidebar-width) 1fr;
            letter-spacing: -0.02em;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BORDERS & PANELS --- */
        .heavy-border-b { border-bottom: var(--border-width) solid var(--fg); }
        .heavy-border-r { border-right: var(--border-width) solid var(--fg); }
        .heavy-border-t { border-top: var(--border-width) solid var(--fg); }
        .heavy-border-l { border-left: var(--border-width) solid var(--fg); }

        /* --- TOP BAR --- */
        #top-bar {
            grid-area: top;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--bg);
            z-index: 100;
            justify-content: space-between;
        }

        .logo { font-size: 14px; letter-spacing: -0.05em; display: flex; align-items: center; gap: 8px; }
        .logo span { background: var(--fg); color: var(--bg); padding: 0 4px; }
        .file-status { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }

        /* --- LEFT TOOLBAR (NAV) --- */
        #left-nav {
            grid-area: nav;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 8px;
            gap: 12px;
        }

        .tool-btn {
            width: 20px;
            height: 20px;
            border: 1px solid var(--fg);
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }
        .tool-btn:hover, .tool-btn.active {
            background: var(--fg);
            color: var(--bg);
        }
        .tool-btn svg { width: 14px; height: 14px; stroke-width: 2.5px; }

        /* --- FILE EXPLORER --- */
        #sidebar {
            grid-area: side;
            background: #f0f0f0;
            overflow-y: auto;
            padding: 8px 0;
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .explorer-item {
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .explorer-item:hover { background: #e0e0e0; }
        .explorer-item.active { background: var(--fg); color: var(--bg); font-weight: bold; }
        .explorer-item.folder { font-weight: 700; text-transform: uppercase; font-size: 10px; opacity: 0.6; margin-top: 8px; }

        /* --- MAIN WORKSPACE --- */
        #workspace {
            grid-area: main;
            display: flex;
            background: #ddd;
            gap: var(--border-width);
            padding-left: var(--border-width);
        }

        .panel {
            flex: 1;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #editor-container { flex: 1; }
        #editor {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            background: transparent;
            color: var(--fg);
        }

        #preview {
            padding: 40px;
            overflow-y: auto;
            color: var(--fg);
            line-height: 1.5;
        }

        /* --- MARKDOWN STYLING --- */
        #preview h1 { font-size: 2rem; border-bottom: 4px solid var(--fg); margin-bottom: 1rem; text-transform: uppercase; font-weight: 900; }
        #preview h2 { font-size: 1.5rem; background: var(--fg); color: var(--bg); display: inline-block; padding: 0 8px; margin: 1.5rem 0 0.5rem 0; }
        #preview p { margin-bottom: 1rem; }
        #preview code { background: #eee; padding: 2px 4px; font-family: var(--font-mono); }
        #preview pre { background: #000; color: #fff; padding: 15px; margin: 1rem 0; font-family: var(--font-mono); font-size: 12px; }
        #preview blockquote { border-left: 8px solid var(--fg); padding-left: 1rem; font-style: italic; margin: 1rem 0; }

        /* --- FOOTER --- */
        #footer {
            grid-area: footer;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            justify-content: space-between;
            background: var(--bg);
            z-index: 100;
        }

        .stat-group { display: flex; gap: 16px; align-items: center; }
        .stat-item { display: flex; align-items: center; gap: 4px; }
        .stat-label { opacity: 0.5; }

        /* --- MODALS & CONTROLS --- */
        .resizer {
            width: 4px;
            background: var(--fg);
            cursor: col-resize;
            transition: background 0.2s;
        }
        .resizer:hover { background: var(--accent); }

        .tag {
            background: var(--fg);
            color: var(--bg);
            padding: 2px 6px;
            font-weight: bold;
            font-size: 9px;
            vertical-align: middle;
        }

        /* --- ANIMATIONS --- */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .cursor-blink { animation: blink 1s infinite steps(1); }

        /* --- PWA RESPONSIVENESS --- */
        @media (max-width: 600px) {
            body {
                grid-template-areas: 
                    "top top"
                    "nav main"
                    "footer footer";
                grid-template-columns: var(--bar-size) 1fr;
            }
            #sidebar { display: none; }
            #preview { display: none; }
            #workspace { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header id="top-bar" class="heavy-border-b">
        <div class="logo">
            <span>SPIFFPICKLE</span> v1.0.4-stable
        </div>
        <div class="file-status">
            INDEXED_DB: <span style="color: green">CONNECTED</span> // 
            <span id="filename-display">UNTITLED_DRAFT.MD</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="tool-btn" onclick="toggleSplit()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 3v18"/></svg></div>
            <div class="tool-btn" onclick="exportFile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></div>
        </div>
    </header>

    <nav id="left-nav" class="heavy-border-r">
        <button class="tool-btn active" title="File Explorer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg></button>
        <button class="tool-btn" title="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
        <button class="tool-btn" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <div style="flex: 1"></div>
        <button class="tool-btn" style="margin-bottom: 8px;" onclick="adjustZoom(-0.1)">-</button>
        <button class="tool-btn" style="margin-bottom: 8px;" onclick="adjustZoom(0.1)">+</button>
    </nav>

    <aside id="sidebar" class="heavy-border-r">
        <div class="explorer-item folder">ROOT_STORAGE</div>
        <div class="explorer-item active" onclick="loadFile('welcome')">
            <svg style="width:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            welcome.md
        </div>
        <div class="explorer-item" onclick="loadFile('project_plan')">
            <svg style="width:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            project_plan.md
        </div>
        <div class="explorer-item folder">ARCHIVE</div>
        <div class="explorer-item" style="opacity: 0.5">
            <svg style="width:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            legacy_notes.md
        </div>
    </aside>

    <main id="workspace">
        <section id="editor-container" class="panel">
            <textarea id="editor" spellcheck="false" placeholder="Begin typing..."></textarea>
        </section>
        <div class="resizer" id="gutter"></div>
        <section id="preview-container" class="panel">
            <div id="preview"></div>
        </section>
    </main>

    <footer id="footer" class="heavy-border-t">
        <div class="stat-group">
            <div class="stat-item">
                <span class="stat-label">MODE:</span> SPLIT_VIEW
            </div>
            <div class="stat-item">
                <span class="stat-label">CHAR:</span> <span id="char-count">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">SYNC:</span> <span id="sync-timer">0ms</span>
            </div>
        </div>
        <div class="stat-group">
            <div class="stat-item">
                <span class="tag">AUTO-SAVE: ON</span>
            </div>
            <div class="stat-item">
                <span id="current-time">00:00:00</span>
            </div>
        </div>
    </footer>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const charCount = document.getElementById('char-count');
        const syncTimer = document.getElementById('sync-timer');
        const filenameDisplay = document.getElementById('filename-display');

        // Simple Markdown Parser (Optical Brutalist Style)
        function parseMarkdown(text) {
            let html = text
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
                .replace(/\*(.*)\*/gim, '<i>$1</i>')
                .replace(/`(.*?)`/gim, '<code>$1</code>')
                .replace(/\n$/gim, '<br />');
            
            // Handle lists
            html = html.replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>').replace(/<\/ul>\s*<ul>/g, '');
            
            return html.trim();
        }

        // Editor Logic
        editor.addEventListener('input', (e) => {
            const start = performance.now();
            const val = e.target.value;
            preview.innerHTML = parseMarkdown(val);
            charCount.innerText = val.length;
            
            // Save to LocalStorage
            localStorage.setItem('spiffpickle_current', val);
            
            const end = performance.now();
            syncTimer.innerText = `${(end - start).toFixed(2)}ms`;
        });

        // Initialize with default text
        const defaultText = `# WELCOME TO SPIFFPICKLE
## THE MICRO-PRESS WORKSTATION

This is a high-fidelity, industrial-grade Markdown editor. 
Designed for speed, clarity, and local-first reliability.

- **Fast**: Sub-1ms render cycles.
- **Secure**: Data stays in your IndexedDB.
- **Brutal**: High-contrast, no-nonsense UI.

> "The medium is the message, but the interface is the law."

## KEYBOARD COMMANDS
- [CTRL+S] Manual Snapshot
- [CTRL+P] Toggle Preview
- [CTRL+B] File Browser`;

        editor.value = localStorage.getItem('spiffpickle_current') || defaultText;
        preview.innerHTML = parseMarkdown(editor.value);
        charCount.innerText = editor.value.length;

        // UI Controls
        function toggleSplit() {
            const previewContainer = document.getElementById('preview-container');
            const gutter = document.getElementById('gutter');
            if (previewContainer.style.display === 'none') {
                previewContainer.style.display = 'flex';
                gutter.style.display = 'block';
            } else {
                previewContainer.style.display = 'none';
                gutter.style.display = 'none';
            }
        }

        let currentZoom = 1;
        function adjustZoom(delta) {
            currentZoom += delta;
            document.documentElement.style.setProperty('--scale', currentZoom);
        }

        function loadFile(name) {
            filenameDisplay.innerText = name.toUpperCase() + ".MD";
            document.querySelectorAll('.explorer-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Gutter Dragging Logic
        let isResizing = false;
        const gutter = document.getElementById('gutter');
        const workspace = document.getElementById('workspace');

        gutter.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const offset = e.clientX - 232; // Sidebar + Nav widths
            const percentage = (offset / workspace.offsetWidth) * 100;
            if (percentage > 10 && percentage < 90) {
                document.getElementById('editor-container').style.flex = `0 0 ${percentage}%`;
            }
        });

        window.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'crosshair';
        });

        // Export Function
        function exportFile() {
            const blob = new Blob([editor.value], {type: 'text/markdown'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filenameDisplay.innerText.toLowerCase();
            a.click();
        }

        // PWA Version Mock
        console.log("Spiffpickle Service Worker Active: Normalized IndexedDB Schema version 2.0.1");
    </script>
</body>
</html>
