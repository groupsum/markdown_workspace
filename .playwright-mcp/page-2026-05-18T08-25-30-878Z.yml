      - generic [ref=e149]:
        - heading "Package chooser" [level=2] [ref=e150]
        - paragraph [ref=e152]: Install ssot-registry when you want the full operator bundle. Install ssot-core when you are embedding registry APIs. Install ssot-cli when automation needs commands such as ssot validate, ssot boundary freeze, and ssot release certify. Use ssot-contracts for schemas and templates, ssot-conformance for reusable checks, ssot-pack-contracts for governance pack interoperability, ssot-views for derived reports and graphs, ssot-codegen for regenerated metadata, and ssot-tui when reviewers need a read-oriented terminal browser.
      - generic [ref=e153]:
        - heading "How SSOT Registry work moves" [level=2] [ref=e154]
        - paragraph [ref=e156]: A typical SSOT Registry workflow starts with ADRs and specs, targets features, links claims to tests and evidence, freezes a boundary, runs verification, certifies the release, promotes it, and publishes the final canonical state.
      - region "Frequently Asked Questions" [ref=e157]:
        - heading "Frequently Asked Questions" [level=2]
        - generic [ref=e158]:
          - article [ref=e159]:
            - heading "What is the source of truth?" [level=3] [ref=e160]
            - paragraph [ref=e162]: The registry JSON and its linked ADR, SPEC, feature, claim, test, evidence, boundary, and release entities are the SSOT, canonical source of truth, and authority record.
          - article [ref=e163]:
            - heading "Why use release boundaries?" [level=3] [ref=e164]
            - paragraph [ref=e166]: Boundaries freeze the target set so certification evaluates the intended scope instead of whatever changed later.
          - article [ref=e167]:
            - heading "How do I start using SSOT Registry in a repo?" [level=3] [ref=e168]
            - paragraph [ref=e170]: "Install the package, run `ssot init .`, add or sync ADRs and specs, create feature rows for targetable work, link tests and evidence, then run `ssot validate .` before relying on the registry."
      - region "Frequently Asked Questions" [ref=e171]:
        - heading "Frequently Asked Questions" [level=2] [ref=e172]
        - generic [ref=e173]:
          - article [ref=e174]:
            - heading "Can SSOT Registry publish release evidence?" [level=3] [ref=e175]
            - paragraph [ref=e177]: Yes. Release rows can include claim and evidence membership, certification reports, promotion snapshots, publication snapshots, and the final canonical authority state.
          - article [ref=e178]:
            - heading "What can a release reviewer inspect?" [level=3] [ref=e179]
            - paragraph [ref=e181]: A release reviewer can inspect the frozen boundary, feature targets, claim tiers, linked tests, evidence rows, certification report, promotion state, publication state, canon, and any blocking issues or risks.
