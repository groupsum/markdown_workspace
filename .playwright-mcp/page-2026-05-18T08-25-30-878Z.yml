        - paragraph [ref=e70]: "A boundary freezes scope: the feature and profile set that a delivery unit will be judged against. A release references that frozen boundary, then carries the claims and evidence used for certification, promotion, publication, or revocation. Scope and shipment stay separate so late changes cannot silently rewrite what was certified."
