              - paragraph [ref=e160]: Bundled extensions ship with the client build. External installable extensions follow the signed-manifest and trust-policy path documented in the extension docs. Published dates and statuses control whether installation docs appear on the lander at all, so draft installation notes can stay private until they are ready.
