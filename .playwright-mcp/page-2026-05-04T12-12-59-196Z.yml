              - heading "Quick Choice Guide" [level=2] [ref=e147]
              - paragraph [ref=e148]: Use the browser route if you want immediate access with no setup. Use the PWA route if you want a dedicated window and installable shell. Use the local route if you need development control, local hosting, or a private self-managed deployment. Use standalone modules if you are embedding MdWrk surfaces into another product or internal tool.
