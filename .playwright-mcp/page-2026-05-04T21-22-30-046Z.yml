            - textbox "Type your markdown here..." [ref=e208]: "# mdwrk client surface The lander now demonstrates the same shared packages that the mdwrk client uses. ## Shared packages | Surface | Package | Notes | | :--- | :---: | ---: | | Editor | `@mdwrk/markdown-editor-react` | Live | | Preview | `@mdwrk/markdown-renderer-react` | Shared | | Themes | `@mdwrk/theme-contract` | Light + dark | | Extensions | Runtime-backed | Governed | ## Workspace signals - [x] Local-first persistence - [x] Split editor and preview packages - [x] Extension-ready client host - [x] Shared theme rendering for docs and blog ## Authoring workflow - Draft Markdown in the editor pane. - Preview headings, tables, lists, and code in the rendered pane. - Keep the source readable as plain text. - Use the same renderer behavior that powers MdWrk docs and blog pages. ## Renderer workflow - Parse Markdown through the shared renderer contract. - Escape raw HTML by default for public content safety. - Apply the lander light and lander dark theme tokens. - Preserve semantic headings so crawlers and assistive technology can read the output. ## Extension workflow - Keep extension boundaries visible. - Use package-level contracts instead of one-off demo code. - Verify theme behavior across both panes. - Treat the rendered preview as the product surface, not a screenshot. ## Example ```typescript import { MarkdownSourceEditor } from \"@mdwrk/markdown-editor-react\"; import { MarkdownRenderer } from \"@mdwrk/markdown-renderer-react\"; const surface = { client: \"@mdwrk/mdwrkspace\", editor: \"@mdwrk/markdown-editor-react\", preview: \"@mdwrk/markdown-renderer-react\" }; ```"
