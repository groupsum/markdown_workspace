version: "3.9"

x-common-env: &common-env
  VITE_DEMO_URL: ${VITE_DEMO_URL:-https://demo.example.com}
  VITE_GITHUB_URL: ${VITE_GITHUB_URL:-https://github.com/example}
  VITE_X_URL: ${VITE_X_URL:-https://x.com/example}
  VITE_COMMUNITY_URL: ${VITE_COMMUNITY_URL:-https://community.example.com}
  VITE_GITHUB_REPO_URL: ${VITE_GITHUB_REPO_URL:-https://github.com/example/markspace}
  VITE_NPM_REPO_URL: ${VITE_NPM_REPO_URL:-https://www.npmjs.com/package/markspace}

services:
  client:
    container_name: markdown_workspace_client
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    networks:
      - dockerwp
  lander:
    container_name: markdown_workspace_lander
    build:
      context: .
      dockerfile: lander/Dockerfile
      args:
        <<: *common-env
    restart: unless-stopped
    environment:
      <<: *common-env
    networks:
      - dockerwp

networks:
  dockerwp:
    name: dockerwp
