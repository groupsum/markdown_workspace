version: "3.9"

services:
  client:
    container_name: markdown_workspace_client
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    networks:
      - dockerwp
  lander:
    container_name: markdown_workspace_lander
    build:
      context: .
      dockerfile: lander/Dockerfile
    restart: unless-stopped
    networks:
      - dockerwp

networks:
  dockerwp:
    name: dockerwp
