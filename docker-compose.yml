version: "3.9"

x-common-env: &common-env
  VITE_DEMO_URL: ${VITE_DEMO_URL:-https://demo.example.com}
  VITE_GITHUB_URL: ${VITE_GITHUB_URL:-https://github.com/example}
  VITE_X_URL: ${VITE_X_URL:-https://x.com/example}
  VITE_COMMUNITY_URL: ${VITE_COMMUNITY_URL:-https://community.example.com}
  VITE_GITHUB_REPO_URL: ${VITE_GITHUB_REPO_URL:-https://github.com/swarmauri/markspace}
  VITE_NPM_REPO_URL: ${VITE_NPM_REPO_URL:-https://www.npmjs.com/package/@swarmauri/markspace}
  VITE_NPM_PACKAGE_NAME: ${VITE_NPM_PACKAGE_NAME:-@swarmauri/markspace}
  VITE_NPM_PACKAGE_PATH: ${VITE_NPM_PACKAGE_PATH:-swarmauri/markspace}
  VITE_NPM_ESM_CDN_URL: ${VITE_NPM_ESM_CDN_URL:-https://esm.sh/@swarmauri/markspace}
  VITE_AUTH_MODE: ${VITE_AUTH_MODE:-pat}
  VITE_PAT_TOKEN: ${VITE_PAT_TOKEN:-}
  VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-}
  VITE_OIDC_FQDN: ${VITE_OIDC_FQDN:-https://md.bz23.xyz}
  VITE_OIDC_CALLBACK_PATH: ${VITE_OIDC_CALLBACK_PATH:-/auth/callback}
  VITE_OIDC_FLOW: ${VITE_OIDC_FLOW:-device}

services:
  client:
    container_name: markdown_workspace_client
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        <<: *common-env
    restart: unless-stopped
    environment:
      <<: *common-env
    networks:
      - dockerwp
  lander:
    container_name: markdown_workspace_lander
    build:
      context: .
      dockerfile: lander/Dockerfile
      args:
        <<: *common-env
    restart: unless-stopped
    environment:
      <<: *common-env
    networks:
      - dockerwp

networks:
  dockerwp:
    name: dockerwp
