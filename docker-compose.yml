x-common-env: &common-env
  VITE_DEMO_URL: ${VITE_DEMO_URL:-https://demo.example.com}
  VITE_GITHUB_URL: ${VITE_GITHUB_URL:-https://github.com/example}
  VITE_X_URL: ${VITE_X_URL:-https://x.com/swarmauri}
  VITE_COMMUNITY_URL: ${VITE_COMMUNITY_URL:-https://community.example.com}
  VITE_SITE_URL: ${VITE_SITE_URL:-https://mdwrk.com}
  VITE_GITHUB_REPO_URL: ${VITE_GITHUB_REPO_URL:-https://github.com/mdwrk/mdwrkspace}
  VITE_NPM_REPO_URL: ${VITE_NPM_REPO_URL:-https://www.npmjs.com/org/mdwrk}
  VITE_NPM_PACKAGE_NAME: ${VITE_NPM_PACKAGE_NAME:-@mdwrk/mdwrkspace}
  VITE_NPM_PACKAGE_PATH: ${VITE_NPM_PACKAGE_PATH:-mdwrk/mdwrkspace}
  VITE_NPM_ESM_CDN_URL: ${VITE_NPM_ESM_CDN_URL:-https://esm.sh/@mdwrk/mdwrkspace}
  VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-}
  VITE_OIDC_FQDN: ${VITE_OIDC_FQDN:-https://md.bz23.xyz}
  VITE_OIDC_CALLBACK_PATH: ${VITE_OIDC_CALLBACK_PATH:-/auth/callback}

services:
  client:
    container_name: markdown_workspace_client
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        <<: *common-env
    restart: unless-stopped
    environment:
      <<: *common-env
    networks:
      - dockerwp
  lander:
    container_name: markdown_workspace_lander
    build:
      context: .
      dockerfile: apps/lander/Dockerfile
      args:
        <<: *common-env
    restart: unless-stopped
    environment:
      <<: *common-env
    networks:
      - dockerwp

networks:
  dockerwp:
    name: dockerwp
